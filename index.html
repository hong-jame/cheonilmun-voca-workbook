건: <span class=\"chip\">guests<\/span><span class=\"chip\">invited<\/span><span class=\"chip\">arrive<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 14 「No.0521~0560」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>The swimming contest will be held in May<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: hold ✗)<\/span><div class=\"point\">&#x27;대회가 열리는&#x27; 거니까 수동태야! 미래라서 will be + 과거분사 held로 써. 함정 단어 hold는 필요 없어.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>People gathered to watch the magic show<\/b><\/span><div class=\"point\">&#x27;~하려고&#x27;라는 목적은 to부정사(to+동사원형)로 나타내! 그래서 to watch.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>This stadium can hold five thousand people<\/b><\/span><div class=\"point\">조동사 can 뒤에는 항상 동사원형! 그래서 holds가 아니라 hold야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>Going on a trip alone is a big adventure for me<\/b><\/span><div class=\"point\">&#x27;~하는 것&#x27;이 주어면 동명사(-ing)로 시작해. 동명사 주어는 단수 취급이라 동사는 is!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> bring → <span class=\"sol\"><b>brings<\/b><\/span><div class=\"point\">주어 Marriage는 단수 취급이야! 현재시제에서 단수 주어면 동사에 -s를 붙여 brings.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> the most big → <span class=\"sol\"><b>the biggest<\/b><\/span><div class=\"point\">big은 짧은 단어라 최상급을 the biggest로 만들어. the most big은 틀린 형태야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> is including → <span class=\"sol\"><b>is included<\/b><\/span><div class=\"point\">요금이 &#x27;포함되는&#x27; 거니까 수동태! be동사 + 과거분사, 즉 is included가 맞아.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> gived → <span class=\"sol\"><b>gave<\/b><\/span><div class=\"point\">give는 불규칙 동사라 과거형이 gived가 아니라 gave야!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> set → <span class=\"sol\"><b>set<\/b><\/span><div class=\"point\">현재완료는 have + 과거분사! set은 불규칙이라 과거분사도 그대로 set이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> make → <span class=\"sol\"><b>Making<\/b><\/span><div class=\"point\">문장 맨 앞 주어 자리이고 &#x27;~하는 것&#x27;이니까 동명사 Making! 첫 글자는 대문자로 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> wrap → <span class=\"sol\"><b>wrapped<\/b><\/span><div class=\"point\">과거에 있었던 일이니까 과거형! wrap은 p를 하나 더 붙여 wrapped.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> announce → <span class=\"sol\"><b>announce<\/b><\/span><div class=\"point\">to 뒤에는 항상 동사원형! 그래서 그냥 announce를 써.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>The host who welcomed the guests delivered a speech.<\/b><\/span><div class=\"point\">사람을 꾸미면서 그 사람이 동작의 주체면 주격 관계대명사 who를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>When you arrive at the hotel, check in at the front desk.<\/b><\/span><div class=\"point\">&#x27;~하면/~할 때&#x27;는 접속사 when으로 이어. 시간 접속사 뒤에서는 미래 상황이어도 현재시제(arrive)를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>Can you wrap this as a gift?<\/b><\/span><div class=\"point\">부탁할 때 조동사 Can you ~?를 쓰고, 조동사 뒤 동사는 원형 wrap!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>The guests whom he invited will arrive soon.<\/b><\/span><div class=\"point\">&#x27;그가 초대한 손님&#x27;처럼 목적어를 꾸밀 땐 목적격 관계대명사 whom(또는 that)을 쓰고, 생략도 가능해!<\/div><\/div><\/div>", "day15": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"The crowd cheered loudly as he scored a goal\" data-trap=\"cheering\"><div><span class=\"num\">1.<\/span><span class=\"ko\">관중들은 그가 골을 넣었을 때 큰 소리로 환호했다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요 (함정 주의!)\"><\/div><div class=\"bank\"><span class=\"chip\">crowd<\/span><span class=\"chip\">The<\/span><span class=\"chip\">scored<\/span><span class=\"chip\">goal<\/span><span class=\"chip\">cheered<\/span><span class=\"chip\">cheering<\/span><span class=\"chip\">loudly<\/span><span class=\"chip\">a<\/span><span class=\"chip\">as<\/span><span class=\"chip\">he<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"He stopped to tie his shoelaces\"><div><span class=\"num\">2.<\/span><span class=\"ko\">그는 신발 끈을 묶기 위해 멈췄다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌 \" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"recording\"><div><span class=\"num\">10.<\/span> <span class=\"sent\">He is  <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\">  his new album in the studio. <span class=\"given\">( record )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"to write|writing\"><div><span class=\"num\">11.<\/span> <span class=\"sent\">Her dream is  <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\">  a film script. <span class=\"given\">( write )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"hit\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">Yesterday I  <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\">  my head on the low ceiling. <span class=\"given\">( hit )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"It was an act that touched many people.|It was an act which touched many people.\" data-example=\"It was an act that touched many people.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">그것은 많은 사람들을 감동시킨 행동이었다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">an act<\/span><span class=\"chip\">that<\/span><span class=\"chip\">touched<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"At the zoo, you can see live animals.\" data-example=\"At the zoo, you can see live animals.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">동물원에서 당신은 살아있는 동물들을 볼 수 있다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">can<\/span><span class=\"chip\">see<\/span><span class=\"chip\">live animals<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"This fantasy novel was made into an animated movie.|This fantasy novel was made into an animated film.\" data-example=\"This fantasy novel was made into an animated movie.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">이 공상 소설은 애니메이션 영화로 만들어졌다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">was made<\/span><span class=\"chip\">into<\/span><span class=\"chip\">movie<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"She loves acting and wants to be an actress.|She loves acting and she wants to be an actress.\" data-example=\"She loves acting and wants to be an actress.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">그녀는 연기하는 것을 아주 좋아해서 여배우가 되고 싶어 한다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">loves acting<\/span><span class=\"chip\">wants to be<\/span><span class=\"chip\">an actress<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 16 「No.0601~0640」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>The audience clapped as the curtain fell<\/b><\/span><div class=\"point\">접속사 as는 &#x27;~할 때, ~하자&#x27;라는 뜻이야. clapped와 fell 둘 다 과거형인 것도 꼭 챙겨!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>We waited in line to enter the concert hall<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: entering ✗)<\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적은 &#x27;to + 동사원형&#x27;으로 나타내! entering이 아니라 to enter가 맞아.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>He gained both wealth and fame as a movie director<\/b><\/span><div class=\"point\">&#x27;both A and B on\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"The village is more peaceful than the city.|The village is more peaceful than a city.\" data-example=\"The village is more peaceful than the city.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">그 마을은 도시보다 더 평화롭다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">more peaceful<\/span><span class=\"chip\">than<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 19 「No.0721~0760」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>They are loading the boxes onto the truck<\/b><\/span><div class=\"point\">지금 하는 중인 일이라 현재진행형 be동사(are)+동사ing를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>Every citizen has the right to vote<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: have ✗)<\/span><div class=\"point\">Every+단수명사는 단수 취급이라 동사는 have가 아니라 has야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>We found a solution to the problem<\/b><\/span><div class=\"point\">과거의 일이고 find는 불규칙동사라 과거형이 found야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>The government promised to cut taxes<\/b><\/span><div class=\"point\">promise(약속하다)는 뒤에 to부정사(to+동사원형)를 데려와!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> did → <span class=\"sol\"><b>done<\/b><\/span><div class=\"point\">수동태는 be동사+과거분사(p.p.)! do의 과거분사는 done이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> matter → <span class=\"sol\"><b>matters<\/b><\/span><div class=\"point\">동명사(Saving~) 주어는 하나로 보는 단수라 동사에 -s를 붙여!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> have fight → <span class=\"sol\"><b>have fought<\/b><\/span><div class=\"point\">현재완료는 have+과거분사! fight는 fight-fought-fought로 변해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> by watch → <span class=\"sol\"><b>by watching<\/b><\/span><div class=\"point\">전치사 by 뒤에는 동사원형이 아니라 동명사(~ing)를 써야 해!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> decrease → <span class=\"sol\"><b>decreasing<\/b><\/span><div class=\"point\">be동사(is) 뒤에서 &#x27;~하는 중&#x27;을 나타내니 진행형 -ing로!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> cause → <span class=\"sol\"><b>caused<\/b><\/span><div class=\"point\">이미 지나간 일이라 과거형! cause에 -d를 붙여 caused.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> provide → <span class=\"sol\"><b>provides<\/b><\/span><div class=\"point\">주어가 3인칭 단수(The shelter)라 현재형 동사에 -s를 붙여!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> follow → <span class=\"sol\"><b>Following<\/b><\/span><div class=\"point\">주어 자리엔 동명사(~ing)나 to부정사를 써! 문장 첫 글자라 대문자로.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>Make sure you turn off the lights.<\/b><\/span><div class=\"point\">make sure 뒤에 &#x27;주어+동사&#x27;를 붙이면 &#x27;반드시 ~해라&#x27;가 돼!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>We should take care of the elderly.<\/b><\/span><div class=\"point\">조동사 should 뒤에는 언제나 동사원형(take)을 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>Plastic bags are bad for the environment.<\/b><\/span><div class=\"point\">주어가 복수(Plastic bags)라 be동사는 is가 아니라 are야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>The village is more peaceful than the city.<\/b><\/span><div class=\"point\">peaceful처럼 긴 형용사는 앞에 more를 붙여 비교급을 만들고 than으로 비교해!<\/div><\/div><\/div>", "day20": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"My parents support my decision to study abroad\"><div><span class=\"num\">1.<\/span><span class=\"ko\">부모님은 해외에서 공부하려는 내 결정을 지지하신다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">to<\/span><span class=\"chip\">my<\/span><span class=\"chip\">parents<\/span><span class=\"chip\">decision<\/span><span class=\"chip\">My<\/span><span class=\"chip\">study<\/span><span class=\"chip\">abroad<\/span><span class=\"chip\">support<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"We are all responsible for saving the environment\" data-trap=\"save\"><div><span class=\"num\">2.<\/span><span class=\"ko\">우리는 모두 환경을 보호할 책임이 있다.<\/span> <span class=\"wa n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>The Olympic Games are an international sports event<\/b><\/span><div class=\"point\">주어 The Olympic Games가 복수라서 be동사는 is가 아니라 are를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>The national team won two gold medals in swimming<\/b><\/span><div class=\"point\">win의 과거형은 winned가 아니라 won이야. 불규칙 동사거든!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>The snow started to melt as it became warm<\/b><\/span><div class=\"point\">여기서 as는 &#x27;~하면서, ~하자&#x27;라는 뜻의 접속사로 쓰였어.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> cycle → <span class=\"sol\"><b>cycled<\/b><\/span><div class=\"point\">물이 &#x27;순환되는&#x27; 거니까 수동태! be동사 뒤에는 과거분사 cycled를 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> have → <span class=\"sol\"><b>has<\/b><\/span><div class=\"point\">동명사(Living ~)로 시작하는 주어는 단수 취급이라 has를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> accept → <span class=\"sol\"><b>accepted<\/b><\/span><div class=\"point\">현재완료 have/has 뒤에는 과거분사! accept는 accepted가 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> ate → <span class=\"sol\"><b>eat<\/b><\/span><div class=\"point\">조동사 should 뒤에는 항상 동사원형! 그래서 ate가 아니라 eat이야.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> lose → <span class=\"sol\"><b>lost<\/b><\/span><div class=\"point\">lose의 과거형은 losed가 아니라 lost! 불규칙 동사라 통째로 외워야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> little → <span class=\"sol\"><b>less<\/b><\/span><div class=\"point\">&#x27;더 적은&#x27;은 little의 비교급 less로 써. little-less-least 기억해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> leave → <span class=\"sol\"><b>leaves<\/b><\/span><div class=\"point\">주어가 The last train(3인칭 단수)이고 반복되는 일이라 동사에 -s를 붙여 leaves!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> last → <span class=\"sol\"><b>lasted<\/b><\/span><div class=\"point\">과거에 일어난 일이니 규칙 동사 last에 -ed를 붙여 lasted로 써.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>This is the red rose that is a symbol of love.<\/b><\/span><div class=\"point\">사물을 꾸며주는 주격 관계대명사 that(또는 which)으로 두 문장을 연결해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>The old painting has the highest value.<\/b><\/span><div class=\"point\">&#x27;가장 ~한&#x27;은 최상급! high의 최상급은 highest이고 앞에 the를 붙여.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>Learning a new language takes a lot of practice.<\/b><\/span><div class=\"point\">동사에 -ing를 붙인 동명사 주어는 단수 취급이라 takes처럼 -s가 붙어.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>I have learned about the traditions of other countries.<\/b><\/span><div class=\"point\">&#x27;~해 왔다&#x27;는 현재완료! have + 과거분사(learned) 형태로 써.<\/div><\/div><\/div>", "day22": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"The dinosaurs disappeared 65 million years ago\" data-trap=\"vanished\"><div><span class=\"num\">1.<\/span><span class=\"ko\">공룡은 육천오백만 년 전에 사라졌다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요 (함정 주의!)\"><\/div><div class=\"bank\ ata-answer=\"Elephants roll in the mud to cool off.|Elephants roll in mud to cool off.\" data-example=\"Elephants roll in the mud to cool off.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">코끼리는 몸을 식히기 위해 진흙에서 뒹군다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">Elephants<\/span><span class=\"chip\">mud<\/span><span class=\"chip\">cool off<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 22 「No.0841~0880」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>The dinosaurs disappeared 65 million years ago<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: vanished ✗)<\/span><div class=\"point\">&#x27;~했다&#x27;는 과거! disappear의 과거형은 동사원형에 -ed를 붙인 disappeared야. vanished는 뜻이 비슷해서 헷갈리게 넣은 함정이니 쓰면 안 돼!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>His dream is to travel all over the world<\/b><\/span><div class=\"point\">&#x27;~하는 것&#x27;은 to+동사원형! is 다음에 to travel을 써서 &#x27;여행하는 것&#x27;이라는 뜻을 만들어.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>This ring is made of pure gold<\/b><\/span><div class=\"point\">&#x27;~로 만들어지다&#x27;는 be동사+과거분사인 수동태! 그래서 is made of로 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>The tree bark can be useful in many ways<\/b><\/span><div class=\"point\">조동사 can 뒤에는 항상 동사원형! 그래서 is가 아니라 can be가 맞아.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> flow → <span class=\"sol\"><b>flows<\/b><\/span><div class=\"point\">주어 The river는 3인칭 단수라서 현재형 동사에 -s를 붙여 flows로 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> taked → <span class=\"sol\"><b>took<\/b><\/span><div class=\"point\">take는 불규칙 동사야! 과거형은 taked가 아니라 took.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> most large → <span class=\"sol\"><b>largest<\/b><\/span><div class=\"point\">large처럼 짧은 형용사는 최상급에 most를 안 쓰고 -est만 붙여서 largest!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> more fast → <span class=\"sol\"><b>faster<\/b><\/span><div class=\"point\">fast는 짧은 단어라 more를 붙이지 않고 -er만 붙여서 faster로 비교급을 만들어!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> shine → <span class=\"sol\"><b>shone<\/b><\/span><div class=\"point\">&#x27;오늘 아침&#x27;이니까 과거! shine은 불규칙이라 shined가 아니라 shone으로 바뀌어.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> stay → <span class=\"sol\"><b>to stay<\/b><\/span><div class=\"point\">&#x27;살아있기 위해&#x27;라는 목적을 나타낼 땐 to+동사원형! 그래서 to stay로 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> have → <span class=\"sol\"><b>has<\/b><\/span><div class=\"point\">주어 A crab은 3인칭 단수라서 have가 has로 바뀌어!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> large → <span class=\"sol\"><b>largest<\/b><\/span><div class=\"point\">&#x27;가장 ~한&#x27;은 최상급! large는 -est를 붙여 largest, 앞에 the도 꼭 필요해.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>Bats are animals that live in caves.<\/b><\/span><div class=\"point\">앞의 명사(animals)를 &#x27;~하는&#x27;으로 꾸며줄 땐 주격 관계대명사 that(=which)! 뒤에 동사 live가 바로 이어져.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>The plane has disappeared into the clouds.<\/b><\/span><div class=\"point\">&#x27;막 ~해 버렸다&#x27;는 현재완료 have/has+과거분사! 주어가 단수라 has disappeared로 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>Living in harmony with nature is necessary.<\/b><\/span><div class=\"point\">&#x27;~하는 것&#x27;이 주어일 땐 동명사(-ing)! 동명사 주어는 단수 취급이라 동사는 is를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>Elephants roll in the mud to cool off.<\/b><\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적은 to+동사원형! 그래서 to cool off로 표현해.<\/div><\/div><\/div>", "day23": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"The door handle is made of metal\"><div><span class=\"num\">1.<\/span><span class=\"ko\">그 문의 손잡이는 금속으로 만들어졌다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">made<\/span><span class=\"chip\">handle<\/span><span class=\"chip\">door<\/span><span class=\"chip\">is<\/span><span class=\"chip\">metal<\/span><span class=\"chip\">The<\/span><span class=\"chip\">of<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"Enter the code to unlock the door\" data-trap=\"for\"><div><span cla /div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 23 「No.0881~0920」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>The door handle is made of metal<\/b><\/span><div class=\"point\">be made of는 &#x27;~로 만들어지다&#x27;라는 수동태 표현이야. of 뒤엔 재료가 와!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>Enter the code to unlock the door<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: for ✗)<\/span><div class=\"point\">목적(~하기 위해)을 나타낼 땐 &#x27;to+동사원형&#x27;을 써! for는 함정이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>I searched for the cheapest flight on the internet<\/b><\/span><div class=\"point\">&#x27;가장 ~한&#x27;은 최상급! cheap은 the cheapest로 바꿔줘.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>The traffic light switched to red<\/b><\/span><div class=\"point\">이미 지나간 일이니까 switch를 과거형 switched로 써야 해!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> are → <span class=\"sol\"><b>is<\/b><\/span><div class=\"point\">information은 셀 수 없는 명사라서 항상 단수 취급! 그래서 is를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> taked → <span class=\"sol\"><b>took<\/b><\/span><div class=\"point\">take는 불규칙 동사라서 과거형이 taked가 아니라 took이야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> based → <span class=\"sol\"><b>be based<\/b><\/span><div class=\"point\">조동사(should) 뒤 수동태는 &#x27;be+과거분사&#x27;! be를 빼먹으면 안 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> sharing → <span class=\"sol\"><b>to share<\/b><\/span><div class=\"point\">allow는 뒤에 &#x27;목적어+to부정사&#x27;를 데려와! allow us to share.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> bring → <span class=\"sol\"><b>brought<\/b><\/span><div class=\"point\">bring은 불규칙 동사라서 과거형이 brought야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> connect → <span class=\"sol\"><b>connected<\/b><\/span><div class=\"point\">&#x27;연결되어 있다&#x27;는 수동의 의미! be동사(are) 뒤엔 과거분사 connected를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> convenient → <span class=\"sol\"><b>more convenient<\/b><\/span><div class=\"point\">than이 보이면 비교급! convenient처럼 긴 단어는 앞에 more를 붙여.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> discover → <span class=\"sol\"><b>discovered<\/b><\/span><div class=\"point\">have 뒤엔 과거분사! &#x27;have+p.p.&#x27;는 현재완료 표현이야.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>His job is to collect and study the data.<\/b><\/span><div class=\"point\">&#x27;~하는 것&#x27;은 보어 자리의 to부정사로! is to collect처럼 써 주면 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>We discovered a cure that treats the disease.<\/b><\/span><div class=\"point\">사물(a cure)을 꾸며주는 주격 관계대명사는 that(또는 which)! 뒤엔 동사가 와.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>The vaccine can protect you from the flu virus.<\/b><\/span><div class=\"point\">조동사 can 뒤엔 항상 동사원형! can protect처럼 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>Turn off the switch when you go out.<\/b><\/span><div class=\"point\">&#x27;~할 때&#x27;는 접속사 when! when 뒤엔 &#x27;주어+동사&#x27;가 와.<\/div><\/div><\/div>", "day24": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"par ass=\"chip\">has<\/span><span class=\"chip\">won<\/span><span class=\"chip\">battle<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Get out of the building before you get trapped.|Get out of the building before you are trapped\" data-example=\"Get out of the building before you get trapped.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">건물에 갇히기 전에 얼른 나가세요.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">get out<\/span><span class=\"chip\">before<\/span><span class=\"chip\">trapped<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 24 「No.0921~0975」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>Some bacteria can be helpful to humans<\/b><\/span><div class=\"point\">조동사 can 뒤에는 무조건 동사원형! be동사도 원형 be로 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>We ordered a cheese pizza for lunch<\/b><\/span><div class=\"point\">과거에 있었던 일이라 동사에 -ed를 붙여 ordered로 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>The car chase was the best scene in the movie<\/b><\/span><div class=\"point\">&#x27;최고의&#x27;는 최상급이라 the best처럼 앞에 the를 꼭 붙여줘야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>The soldiers fought bravely in the battle<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: fight ✗)<\/span><div class=\"point\">fight의 과거형은 fought! 불규칙 동사라서 fight를 그대로 쓰면 안 돼.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> jail → <span class=\"sol\"><b>jailed<\/b><\/span><div class=\"point\">&#x27;~되다&#x27;라는 수동태는 be동사 + 과거분사! jail의 과거분사는 jailed야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> have → <span class=\"sol\"><b>has<\/b><\/span><div class=\"point\">every 뒤에는 단수 취급이라 동사도 단수형 has로 맞춰줘야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> move → <span class=\"sol\"><b>to move<\/b><\/span><div class=\"point\">order + 목적어 뒤에는 to부정사가 와야 해서 to move가 맞아!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> Hunt → <span class=\"sol\"><b>Hunting<\/b><\/span><div class=\"point\">&#x27;사냥하는 것&#x27;처럼 주어 자리에 동사를 쓰려면 동명사(~ing)로!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> many → <span class=\"sol\"><b>more<\/b><\/span><div class=\"point\">than(~보다) 앞에는 비교급! many의 비교급은 more야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> steal → <span class=\"sol\"><b>stole<\/b><\/span><div class=\"point\">앞 문장이 과거니까 steal도 과거로! steal-stole 불규칙 동사야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> be → <span class=\"sol\"><b>is<\/b><\/span><div class=\"point\">주어 Religion이 단수라서 be동사는 is로 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> trap → <span class=\"sol\"><b>trapped<\/b><\/span><div class=\"point\">was + 과거분사는 수동태! trap은 p를 하나 더 붙여 trapped가 돼.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>We vote to choose a new leader.<\/b><\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적은 to부정사(to+동사원형)로 나타내!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>The police chased the criminal who stole the cash.<\/b><\/span><div class=\"point\">사람을 꾸며주는 주격 관계대명사는 who! 뒤에 동사가 바로 와.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>She has finally won her battle with cancer.<\/b><\/span><div class=\"point\">현재완료는 has + 과거분사! win의 과거분사는 won이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>Get out of the building before you get trapped.<\/b><\/span><div class=\"point\">&#x27;~하기 전에&#x27;는 접속사 before! 뒤에 주어+동사가 이어져.<\/div><\/div><\/div>"};
function workbookHTML(){
  const s=SETS[state.setIdx];
  const inner=WORKBOOKS[s.key] || '<div class="wb-lead">이 세트의 워크북은 준비 중이에요.</div>';

function wireWorkbook(){
  const root=document.querySelector('.wbwrap'); if(!root) return;
  const norm=(s)=>(s||'').replace(/\s+/g,' ').trim();
  const normText=(s)=>(s||'').toLowerCase().replace(/['’]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
  function refresh(q){const zone=q.querySelector('.answer-zone');
    zone.classList.toggle('empty', zone.querySelectorAll('.chip').length===0);
    zone.classList.remove('correct','wrong');
    const v=q.querySelector('.verdict'); v.textContent=''; v.className='verdict';}
  function type1Correct(q){const got=norm([].map.call(q.querySelector('.answer-zone').querySelectorAll('.chip'),c=>c.textContent).join(' '));
    return got===norm(q.getAttribute('data-answer'));}
  let active=null;
  function afterElement(zone,x,y,skip){const els=[].slice.call(zone.querySelectorAll('.chip')).filter(c=>c!==skip);
    let best={dist:Infinity,el:null,before:true};
    els.forEach(el=>{const b=el.getBoundingClientRect();const cx=b.left+b.width/2,cy=b.top+b.height/2;
      const d=Math.abs(y-cy)*3+Math.abs(x-cx); if(d<best.dist)best={dist:d,el:el,before:(x<cx)};});
    return best;}
  function beginDrag(){const chip=active.chip,r=chip.getBoundingClientRect();const g=chip.cloneNode(true);
    g.className='chip ghost';g.style.width=r.width+'px';g.style.left=(r.left+r.width/2)+'px';g.style.top=(r.top+r.height/2)+'px';
    document.body.appendChild(g);active.ghost=g;active.dragging=true;chip.classList.add('dragging');}
  function moveGhost(x,y){const g=active.ghost;g.style.left=x+'px';g.style.top=y+'px';g.style.display='none';
    const under=document.elementFromPoint(x,y);g.style.display='';
    const zone=(under&&under.closest)?under.closest('.answer-zone,.bank'):null;
    if(zone&&zone.closest('.dnd')===active.q){const pos=afterElement(zone,x,y,active.chip);
      if(!pos.el)zone.appendChild(active.chip);else if(pos.before)zone.insertBefore(active.chip,pos.el);else zone.insertBefore(active.chip,pos.el.nextSibling);
      active.q.querySelectorAll('.answer-zone,.bank').forEach(z=>z.classList.toggle('over',z===zone));}}
  function onDown(e){if(e.button!==undefined&&e.button>0)return;const chip=e.currentTarget;
    active={chip,q:chip.closest('.dnd'),startX:e.clientX,startY:e.clientY,ghost:null,dragging:false,pid:e.pointerId};
    document.addEventListener('pointermove',onMove,{passive:false});document.addEventListener('pointerup',onUp);document.addEventListener('pointercancel',onUp);}
  function onMove(e){if(!active||(e.pointerId!==undefined&&e.pointerId!==active.pid))return;
    if(!active.dragging){if(Math.hypot(e.clientX-active.startX,e.clientY-active.startY)<8)return;beginDrag();}
    e.preventDefault();moveGhost(e.clientX,e.clientY);}
  function onUp(e){if(!active||(e.pointerId!==undefined&&e.pointerId!==active.pid))return;
    document.removeEventListener('pointermove',onMove,{passive:false});document.removeEventListener('pointerup',onUp);document.removeEventListener('pointercancel',onUp);
    const chip=active.chip,q=active.q;
    if(active.dragging){if(active.ghost)active.ghost.remove();chip.classList.remove('dragging');q.querySelectorAll('.over').forEach(z=>z.classList.remove('over'));}
    else{const zone=q.querySelector('.answer-zone'),bank=q.querySelector('.bank');(chip.parentElement===bank?zone:bank).appendChild(chip);}
    refresh(q);active=null;}
  root.querySelectorAll('.dnd').forEach(q=>{
    const bank=q.querySelector('.bank'),zone=q.querySelector('.answer-zone');let order=0;
    q.querySelectorAll('.chip').forEach(c=>{c.dataset.order=order++;c.addEventListener('pointerdown',onDown);});
    q.querySelector('.btn-check').addEventListener('click',()=>{
      const got=norm([].map.call(zone.querySelectorAll('.chip'),c=>c.textContent).join(' '));
      const ans=norm(q.getAttribute('data-answer')),trap=q.getAttribute('data-trap'),v=q.querySelector('.verdict');
      zone.classList.remove('correct','wrong');
      if(got===ans){zone.classList.add('correct');v.className='verdict ok';v.textContent='✅ 정답이에요! 완벽해요!';}
      else{zone.classList.add('wrong');v.className='verdict no';
        if(got==='')v.textContent='단어를 정답칸에 놓아 주세요!';
        else if(trap&&got.split(' ').indexOf(trap)>-1)v.textContent='⚠️ 함정 단어 "'+trap+'"가 들어 있어요. 빼고 다시!';
        else v.textContent='❌ 순서를 다시 확인해 보세요.';}});
    q.querySelector('.btn-reset').addEventListener('click',()=>{
      [].slice.call(q.querySelectorAll('.chip')).sort((a,b)=>a.dataset.order-b.dataset.order).forEach(c=>bank.appendChild(c));
      refresh(q);});
    refresh(q);
  });
  function iqCorrect(q){const got=normText(q.querySelector('.iq-input').value);if(!got)return null;
    return q.getAttribute('data-answer').split('|').map(normText).indexOf(got)>-1;}
  function showReveal(q){const r=q.querySelector('.reveal-ans');if(!r)return;
    const ex=q.getAttribute('data-example')||q.getAttribute('data-answer').split('|')[0];
    r.innerHTML='정답 예시: <b>'+esc(ex)+'</b>';r.classList.add('show');}
  function iqCheck(q){const inp=q.querySelector('.iq-input'),v=q.querySelector('.verdict'),res=iqCorrect(q);
    inp.classList.remove('ok','no');
    if(res===null){v.className='verdict no';v.textContent='답을 입력해 주세요!';return;}
    if(res){inp.classList.add('ok');v.className='verdict ok';v.textContent='✅ 정답!';}
    else{inp.classList.add('no');v.className='verdict no';v.textContent='❌ 다시 시도!';showReveal(q);}}
  root.querySelectorAll('.iq').forEach(q=>{const inp=q.querySelector('.iq-input');
    q.querySelector('.iq-check').addEventListener('click',()=>iqCheck(q));
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();iqCheck(q);}});
    inp.addEventListener('input',()=>{inp.classList.remove('ok','no');const v=q.querySelector('.verdict');v.textContent='';v.className='verdict';});
    const rv=q.querySelector('.iq-reveal');if(rv)rv.addEventListener('click',()=>showReveal(q));});
  root.querySelector('.wb-gradeall').addEventListener('click',()=>{
    let correct=0,total=0,blank=0;
    root.querySelectorAll('.dnd').forEach(q=>{total++;const ok=type1Correct(q);
      const zone=q.querySelector('.answer-zone'),v=q.querySelector('.verdict');zone.classList.remove('correct','wrong');
      if(ok){correct++;zone.classList.add('correct');v.className='verdict ok';v.textContent='✅ 정답!';}
      else{zone.classList.add('wrong');v.className='verdict no';v.textContent='❌ 다시 확인';}});
    root.querySelectorAll('.iq').forEach(q=>{total++;const r=iqCorrect(q),inp=q.querySelector('.iq-input'),v=q.querySelector('.verdict');inp.classList.remove('ok','no');
      if(r===null){blank++;v.className='verdict no';v.textContent='미입력';}
      else if(r){correct++;inp.classList.add('ok');v.className='verdict ok';v.textContent='✅ 정답!';}
      else{inp.classList.add('no');v.className='verdict no';v.textContent='❌ 다시!';showReveal(q);}});
    const pct=Math.round(correct/total*100);
    let msg='📊 점수: <span class="big">'+correct+' / '+total+'</span> · '+pct+'점';
    if(blank>0)msg+=' (미입력 '+blank+')';
    msg+=pct===100?' 🎉 완벽해요!':(pct>=70?' 👍 잘했어요!':' 💪 다시 도전!');
    const box=root.querySelector('#scorebox');box.innerHTML=msg;box.classList.add('show');
    try{const s=SETS[state.setIdx];setBest(s.key,'workbook',pct);
      addHistory({date:todayStr(),pages:s.pages,topic:s.topic,mode:'workbook',modeName:'구문·어법 워크북',score:correct,total,pct,retry:false});
      gam_record({kind:'workbook',setKey:s.key,pages:s.pages,topic:s.topic,results:[],score:correct,total});}catch(_){}
    box.scrollIntoView({behavior:'smooth',block:'center'});});
  const tog=root.querySelector('.wb-toggle');
  tog.addEventListener('click',()=>{const a=root.querySelector('#answerSheet');
    a.classList.toggle('hide');tog.textContent=a.classList.contains('hide')?'정답·해설 보기':'정답·해설 숨기기';
    if(!a.classList.contains('hide'))a.scrollIntoView({behavior:'smooth'});});
}


/* ===== 게임화 · SRS (통합) ===== */
const SRS_IV=[0,1,2,4,8,16,32];
function gToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function gAddDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function srsUpdate(setKey,word,ok){const key=setKey+'::'+word;let e=store.srs[key]||{box:0,correct:0,wrong:0,last:'',next:''};
  if(ok){e.correct++;e.box=Math.min(e.box+1,6);}else{e.wrong++;e.box=Math.max(e.box-1,0);}
  e.last=gToday();e.next=gAddDays(ok?SRS_IV[e.box]:0);store.srs[key]=e;return e;}
function dueWords(){const out=[];const t=gToday();SETS.forEach(s=>s.words.forEach(w=>{const e=store.srs[s.key+'::'+w.w];if(e&&e.next<=t&&!isInstruction(w))out.push({s,w,e});}));return out;}
function masteryPct(setKey){const s=SETS.find(x=>x.key===setKey);if(!s)return 0;let m=0;s.words.forEach(w=>{const e=store.srs[setKey+'::'+w.w];if(e&&e.box>=3)m++;});return Math.round(m/s.words.length*100);}
function masteredCount(){let c=0;for(const k in store.srs){if(store.srs[k].box>=3)c++;}return c;}
function levelFor(xp){return Math.floor(Math.sqrt((xp||0)/40))+1;}
function xpInLevel(xp){xp=xp||0;const l=levelFor(xp);const base=40*(l-1)*(l-1);const next=40*l*l;return {l,cur:xp-base,need:next-base};}
function addXP(n){store.xp=(store.xp||0)+n;}
function touchStreak(){const t=gToday(),y=gAddDays(-1);if(store.streak.last===t)return false;
  if(store.streak.last===y)store.streak.count++;else store.streak.count=1;store.streak.last=t;return true;}
const BADGES=[
  {id:'first',e:'🌱',n:'첫걸음',d:'첫 학습 완료',c:s=>s.act>=1},
  {id:'perfect',e:'🏅',n:'만점왕',d:'첫 만점 달성',c:s=>s.perfect>=1},
  {id:'streak3',e:'🔥',n:'3일 연속',d:'3일 연속 학습',c:s=>store.streak.count>=3},
  {id:'streak7',e:'⚡',n:'일주일 개근',d:'7일 연속 학습',c:s=>store.streak.count>=7},
  {id:'m50',e:'📗',n:'50단어 마스터',d:'50단어 숙달',c:s=>masteredCount()>=50},
  {id:'m100',e:'📚',n:'100단어 마스터',d:'100단어 숙달',c:s=>masteredCount()>=100},
  {id:'m300',e:'🎓',n:'300단어 마스터',d:'300단어 숙달',c:s=>masteredCount()>=300},
  {id:'lv5',e:'⭐',n:'레벨 5',d:'레벨 5 달성',c:s=>levelFor(store.xp)>=5},
  {id:'wb',e:'✍️',n:'워크북 만점',d:'워크북 만점 달성',c:s=>s.wbPerfect>=1},
  {id:'chal',e:'🏆',n:'챌린저',d:'데일리 챌린지 완료',c:s=>s.challenge>=1},
];
function checkBadges(){const nu=[];const st=store.counts;BADGES.forEach(b=>{if(store.badges.indexOf(b.id)<0&&b.c(st)){store.badges.push(b.id);nu.push(b);}});return nu;}
function gam_record(o){
  store.counts=store.counts||{act:0,perfect:0,wbPerfect:0,challenge:0};
  store.counts.act++;let gained=0;
  (o.results||[]).forEach(r=>{srsUpdate(o.setKey,r.w,r.ok);gained+=r.ok?2:0;});
  if(o.kind==='workbook'){gained+=o.score*2;if(o.total>0&&o.score===o.total)store.counts.wbPerfect++;}
  if(o.kind==='challenge'){store.counts.challenge++;gained+=o.score*3;}
  const perfect=o.total>0&&o.score===o.total;if(perfect)store.counts.perfect++;
  const before=levelFor(store.xp);addXP(gained);const after=levelFor(store.xp);

/* ---- 음성 인식 ---- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog=null, recording=false;
function srSupported(){return !!SR;}

/* 영어 채점 */
function normEn(s){return (s||"").toLowerCase().replace(/[^a-z ]/g,"").trim();}
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];}
// 영국식/미국식 철자 차이는 정답으로 인정 (예: recognise=recognize)
function ukUs(a,b){
  const f=(x)=>x.replace(/ise$/,"ize").replace(/isation$/,"ization")
    .replace(/our$/,"or").replace(/re$/,"er").replace(/ll/g,"l").replace(/ae|oe/g,"e");
  return f(a)===f(b);
}
// typed=true 이면 철자를 정확히 요구(오타 불인정), 음성이면 근접 발음 허용
function matchEn(target,heardList,typed){
  const tgt=normEn(target);
  for(const h of heardList){
    const hh=normEn(h); if(!hh) continue;
    if(hh===tgt) return {ok:true,heard:h};                 // 정확 일치
    if(ukUs(hh,tgt)) return {ok:true,heard:h};             // 영/미 철자 차이만 허용
    if(typed) continue;                                    // 타이핑은 여기까지(오타 불인정)
    // ↓ 음성 인식일 때만: 여러 단어로 들리거나 발음이 근접하면 허용
    if(hh.split(" ").includes(tgt)) return {ok:true,heard:h};
    const dist=lev(tgt,hh.replace(/ /g,""));
    const tol = tgt.length>=8 ? 1 : (tgt.length>=5 ? 1 : 0); // 훨씬 엄격하게
    if(tol>0 && dist<=tol) return {ok:true,heard:h};
  }
  return {ok:false,heard:heardList[0]||""};
}

/* 한글 채점 */
function normKo(s){return (s||"").replace(/\([^)]*\)/g,"").replace(/~/g,"").replace(/[.\/·]/g," ").replace(/\s+/g,"").trim();}

/* 한글 자모 분해 기반 근접 판정 (음성 오인식 흡수: 움직임↔움직이 등) */
function decomposeKo(s){
  const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const JUNG=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const JONG=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  let out=[];
  for(const ch of s){
    const code=ch.charCodeAt(0)-0xAC00;
    if(code>=0 && code<11172){
      out.push(CHO[Math.floor(code/588)]);
      out.push(JUNG[Math.floor((code%588)/28)]);
      const j=code%28; if(j) out.push(JONG[j]);
    } else out.push(ch);
  }
  return out.join('');
}
function levStr(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];}
// 두 한글 단어가 발음상 거의 같은지 (끝소리 오인식만 인정, 앞부분 차이는 거부)
function koClose(a,b){
  if(!a||!b) return false;
  if(a===b) return true;
  // 짧은 단어(2글자 이하)는 자모가 적어 오탐 위험 → 근접 판정 안 함 (바다↔배, 얼↔열 차단)
  if(a.length<=2 || b.length<=2) return false;
  const da=decomposeKo(a), db=decomposeKo(b);
  if(Math.abs(da.length-db.length)>1) return false; // 길이 차 크면 다른 말
  const dist=levStr(da,db);
  if(dist>1) return false;                            // 자모 2개 이상 차이는 다른 말
  // 자모 1개 차이여도, 그 차이가 '앞쪽'이면 다른 단어(과학↔화학, 향상↔항상) → 거부
  const keep=Math.floor(Math.min(da.length,db.length)*0.6);
  if(keep>=1 && da.slice(0,keep)!==db.slice(0,keep)) return false;
  return true;

// 정규화된 그룹 (빠른 조회)
const SYN_GROUPS = SYNONYMS.map(g=>g.map(x=>normKo(x)).filter(Boolean));
// 형용사/동사 어간 추출 (거대한->거대, 줄이다->줄이, 영리한->영리)
function koStem(x){
  return x.replace(/(스러운|로운|러운|하는|되는|시키는|한|난|은|인|다|하다|되다|시키다|기)$/,"");
}
function synMatch(a,b){
  for(const g of SYN_GROUPS){ if(g.includes(a)&&g.includes(b)) return true; }
  // 어간 단위로도 그룹 대조 (활용형 흡수)
  const as=koStem(a), bs=koStem(b);
  if(as.length>=1 && bs.length>=1 && (as!==a || bs!==b)){
    for(const g of SYN_GROUPS){
      const stems=g.map(koStem);
      if(stems.includes(as)&&stems.includes(bs)) return true;
    }
  }
  return false;
}

function answerKeys(mean){
  const parts=mean.split(/[,、;；\/]/).map(p=>normKo(p)).filter(Boolean);
  const keys=new Set();
  parts.forEach(p=>{keys.add(p);
    const stem=p.replace(/(하다|되다|시키다|하는|되는|한|된|히|이다|다)$/,"");
    if(stem.length>=1)keys.add(stem);});
  return [...keys];
}
function matchKo(mean,heardList,word,spoken){
  // 이 단어가 여러 세트에서 가진 모든 뜻을 정답 키로 통합 (movement=움직임/운동 모두 인정)
  let keys=answerKeys(mean);
  const extra=allMeansFor(word);
  if(extra.length){
    const set=new Set(keys);
    extra.forEach(m=>answerKeys(m).forEach(k=>set.add(k)));
    keys=[...set];
  }
  // 종결 조사만 제거 (부사/형용사 파생 어미 '~하게/~적으로/~답게' 등은 남겨 품사 구분 유지)
  const stripJosa=(x)=>x.replace(/(습니다|ㅂ니다|입니다|이에요|예요|이요|이야|야|이다|요)$/,"");
  for(const raw of heardList){
    let h=normKo(raw); if(!h) continue;
    h=stripJosa(h);
    // 1) 정확 일치만 인정 (부분 포함 판정은 쓰지 않음 → 명사↔부사 오탐 차단)
    for(const k of keys){ if(h===k) return {ok:true,heard:raw}; }
    // 2) 등록된 유사어 그룹만 추가 인정 (활용형은 synMatch 내부 koStem이 흡수)
    for(const k of keys){ if(synMatch(h,k)) return {ok:true,heard:raw}; }
    // 2.5) 뉘앙스/부분 정답: 학생 답이 정답의 '앞부분(핵심 수식어)'과 일치하면 인정
    //      (엄지 ↔ 엄지손가락). 한 쪽이 다른 쪽의 접두일 때만 → 뒷부분(일반명사)·부사 오탐은 차단.
    for(const k of keys){
      if(h.length>=2 && k.length>=2 && (k.startsWith(h) || h.startsWith(k))) return {ok:true,heard:raw};
    }
    // 3) 음성 입력일 때만: 자모 1개 차이(끝소리 오인식 등)는 정답 인정 (움직임↔움직이)
    if(spoken){
      for(const k of keys){ if(koClose(h,k)) return {ok:true,heard:raw}; }
      // 뒤에 딴말이 붙은 경우: 앞부분이 정답과 근접하면 인정 (움직이는것→움직임)
      // 단, 파생 어미(~답게/~하게/~적으로 등)가 붙은 건 품사가 달라지므로 제외
      const hasDeriv=/(답게|스럽게|롭게|하게|있게|적으로|적인|스러운|로운)/.test(h);
      if(!hasDeriv){
        for(const k of keys){
          if(k.length>=2 && h.length>k.length){
            const head=h.slice(0,k.length);
            if(koClose(head,k)) return {ok:true,heard:raw};
          }
        }
      }
    }
  }
  return {ok:false,heard:heardList[0]||""};
}

let exquiz=null;
// 시험 지시문 성격의 문장(예문이 아님)은 제외
function isInstruction(w){
  const ko=w.exKo||"", en=w.ex||"";
  if(/고르시오|고르세요|물음에 답|알맞은 것을|가장 적절한 것을|밑줄 친|빈칸에 들어갈/.test(ko)) return true;
  if(/^Choose |^Read the|^What is the (best )?(title|main)|for the passage/i.test(en)) return true;
  return false;
}
function blankExample(word, ex){
  if(!ex) return null;
  const w=(word||"").trim();
  if(w.includes(" ")||w.includes("~")){
    const core=w.replace(/~/g,"").trim();
    const re=new RegExp(core.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i");
    if(re.test(ex)) return ex.replace(re,"______");
    return null;
  }
  let stem=w;
  if(/(e|y)$/.test(w)) stem=w.slice(0,-1);
  const re=new RegExp("\\b"+stem.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"[a-z]{0,4}\\b","i");
  const m=ex.match(re);
  if(m) return ex.replace(m[0],"______");
  return null;
}
function startExQuiz(kind){
  const s=SETS[state.setIdx];
  // 지시문 성격 문장은 예문 시험에서 제외
  const valid=s.words.filter(w=>!isInstruction(w));
  let pool=valid.map(w=>({w, blank: blankExample(w.w, w.ex)}));
  if(kind==="exword") pool=pool.filter(x=>x.blank);
  else pool=pool.filter(x=>x.w.ex && x.w.exKo);
  pool=shuffle(pool);
  const qs=pool.map(x=>{
    let prompt, answer, options;
    if(kind==="exword"){
      prompt=x.blank; answer=x.w.w;
      const wrongs=shuffle(valid.filter(o=>o.w!==x.w.w)).slice(0,3).map(o=>o.w);
      options=shuffle([answer,...wrongs]);
    }else{
      prompt=x.w.ex; answer=x.w.exKo;
      // 오답 해석도 지시문이 아닌 실제 예문 해석에서만 뽑기 + 중복 방지
      const others=[...new Set(valid.filter(o=>o.exKo && o.exKo!==x.w.exKo).map(o=>o.exKo))];
      const wrongs=shuffle(others).slice(0,3);
      options=shuffle([answer,...wrongs]);
    }
    return {word:x.w, prompt, answer, options};
  });
  exquiz={kind, qs, i:0, picked:null, score:0, results:[], done:false, saved:false, showHint:false};
}
function exQuizHTML(){
  const s=SETS[state.setIdx];
  const kind=exquiz.kind;
  const modeName= kind==="exword" ? "예문 빈칸 시험" : "예문 해석 시험";
  if(!exquiz.qs.length){
    return `<header><button class="backbtn" data-modes>‹ 뒤로</button><h1>${esc(s.pages)} ${modeName}</h1></header>
      <div class="quiz"><div class="qcard"><p style="color:var(--sub)">이 세트에는 예문 문제를 만들 수 있는 항목이 부족해요.</p>
      <button class="stbtn solid" data-modes style="margin-top:16px;">돌아가기</button></div></div>`;
  }
  if(exquiz.done){
    const total=exquiz.qs.length, score=exquiz.score, pct=Math.round(score/total*100);
    if(!exquiz.saved){ setBest(s.key, kind, pct);
      addHistory({date:todayStr(),pages:s.pages,topic:s.topic,mode:kind,
        modeName:modeName,score,total,pct,retry:false}); exquiz.saved=true;
      try{gam_record({kind:"exquiz",setKey:s.key,pages:s.pages,topic:s.topic,results:exquiz.results.filter(Boolean).map(r=>({w:r.word.w,ok:r.ok})),score,total});}catch(_){} }
    const rev=exquiz.results.map(r=>`
      <div class="rvrow ${r.ok?'ok':'no'}"><div class="rok">${r.ok?'✓':'✕'}</div>
        <div class="rw"><b>${esc(r.word.w)}</b><span>${esc(r.word.mean)}</span></div>
        <button class="rspk" data-speak="${esc(r.word.w)}" data-lang="en">${ICON_SPK_SM}</button></div>`).join("");
    return `
      <header><button class="backbtn" data-modes>‹ 뒤로</button><h1>${esc(s.pages)} 결과</h1>
        <div class="sub">${modeName} · 객관식</div></header>
      <div class="quiz"><div class="stresult">
        <div class="score">${score} / ${total}</div>
        <div class="lbl">${score===total?'완벽해요! 🎉':score>=total*0.7?'아주 잘했어요! 👏':'조금만 더 연습해봐요 💪'}</div>
        <button class="stbtn send" data-share style="margin-top:20px;width:100%;">📤 부모님께 결과 보내기</button>
        <button class="stbtn ghost" data-exretry style="margin-top:10px;width:100%;">다시 도전</button>
        <div class="review"><h4>단어별 결과</h4>${rev}</div>
      </div></div>`;
  }
  const q=exquiz.qs[exquiz.i];
  const pct=Math.round(exquiz.i/exquiz.qs.length*100);
  const opts=q.options.map(o=>{
    let cls="exopt";
    if(exquiz.picked!==null){
      if(o===q.answer) cls+=" correct";
      else if(o===exquiz.picked) cls+=" wrong";
    }
    return `<button class="${cls}" data-exopt="${esc(o)}" ${exquiz.picked!==null?'disabled':''}>${esc(o)}</button>`;
  }).join("");
  const hint = kind==="exword"
    ? (exquiz.showHint
        ? `<div class="exhint">뜻 힌트: <b>${esc(q.word.mean)}</b></div>`
        : `<button class="hintbtn" data-exhint>💡 힌트 보기</button>`)
    : "";
  return `
    <header><button class="backbtn" data-modes>‹ 뒤로</button>
      <h1>${esc(s.pages)} · ${modeName}</h1>
      <div class="sub">${kind==="exword"?"빈칸에 알맞은 단어를 고르세요":"알맞은 해석을 고르세요"}</div></header>
    <div class="quiz">
      <div class="qcard">
        <div class="qprog">${exquiz.i+1} / ${exquiz.qs.length}</div>
        <div class="qbar"><i style="width:${pct}%"></i></div>
        <div class="exprompt ${kind==="exword"?"":"small"}">${esc(q.prompt)}</div>
        ${hint}
        <div class="exopts">${opts}</div>
        <button class="qnext" data-exnext ${exquiz.picked===null?'disabled':''}>${exquiz.i+1===exquiz.qs.length?'결과 보기':'다음 →'}</button>
      </div>
    </div>`;
}

function buildShareText(){
  const s=SETS[state.setIdx];
  const name=(store.name||"").trim();
  const who = name ? `${name} ` : "";
  // 예문 퀴즈 결과
  if(state.view==="exquiz" && exquiz){
    const total=exquiz.qs.length, score=exquiz.score, pct=Math.round(score/total*100);
    const emoji = pct===100?"🎉":pct>=70?"👏":"💪";
    const wrong=exquiz.results.filter(r=>r&&!r.ok).map(r=>r.word.w);
    let msg=`[영어 단어 시험 결과] ${emoji}\n${who}학생\n`;
    msg+=`· 범위: ${s.pages} ${s.topic}\n`;
    msg+=`· 유형: ${exquiz.kind==="exword"?"예문 빈칸(객관식)":"예문 해석(객관식)"}\n`;
    msg+=`· 점수: ${score} / ${total} (${pct}점)\n· 날짜: ${todayStr()}`;
    if(wrong.length) msg+=`\n· 틀린 단어: ${wrong.slice(0,10).join(", ")}${wrong.length>10?" 외":""}`;
    return msg;
  }
  if(!test) return "";
  const total=test.qs.length, score=test.results.filter(r=>r&&r.ok).length;
  const pct=Math.round(score/total*100);
  const emoji = pct===100?"🎉":pct>=70?"👏":"💪";
  const wrong=test.results.filter(r=>r&&!r.ok).map(r=>r.w.w);
  let msg=`[영어 단어 시험 결과] ${emoji}\n`;
  msg+=`${who}학생\n`;
  msg+=`· 범위: ${s.pages} ${s.topic}\n`;
  msg+=`· 유형: ${test.mode==="ko"?"뜻 말하기(영→한)":"단어 말하기(한→영)"}\n`;
  msg+=`· 점수: ${score} / ${total} (${pct}점)\n`;
  msg+=`· 날짜: ${todayStr()}`;
  if(wrong.length) msg+=`\n· 틀린 단어: ${wrong.slice(0,10).join(", ")}${wrong.length>10?" 외":""}`;
  return msg;
}
async function shareResult(){
  const text=buildShareText();
  if(!text) return;
  // 1) 폰 기본 공유창 (카톡·문자 등 선택)
  if(navigator.share){
    try{ await navigator.share({title:"영어 단어 시험 결과", text}); return; }
    catch(e){ if(e && e.name==="AbortError") return; /* 사용자가 취소 */ }
  }
  // 2) 클립보드 복사 폴백
  try{
    await navigator.clipboard.writeText(text);
    showToast("결과가 복사됐어요! 카톡·문자에 붙여넣어 보내세요.");
    return;
  }catch(_){}
  // 3) 최후: 텍스트 보여주고 직접 복사
  showShareModal(text);
}
function showToast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"), 2600);
}
function showShareModal(text){
  let m=document.getElementById("sharemodal");
  if(m) m.remove();
  m=document.createElement("div"); m.id="sharemodal"; m.className="modal";
  m.innerHTML=`<div class="modalbox">
    <div class="modaltitle">부모님께 보낼 내용</div>
    <textarea class="modalta" readonly>${esc(text)}</textarea>
    <div class="modalhint">아래 내용을 길게 눌러 복사한 뒤 카톡·문자로 보내세요.</div>
    <button class="stbtn solid" id="modalclose" style="width:100%;">닫기</button>
  </div>`;
  document.body.appendChild(m);
  m.querySelector("#modalclose").onclick=()=>m.remove();
  m.onclick=(e)=>{ if(e.target===m) m.remove(); };
  const ta=m.querySelector(".modalta"); ta.focus(); ta.select();
}

/* ---- 시험 (mode: 'ko'=영어보고 한글말하기 / 'en'=한글보고 영어말하기) ---- */
function startTest(mode, wordList){
  const s=SETS[state.setIdx];
  const pool = (wordList && wordList.length) ? wordList : s.words;
  test={mode, qs:shuffle(pool), i:0, results:[], phase:"ready", heard:"", ok:null, retryWrong:!!wordList};
}
function testHTML(){
  const s=SETS[state.setIdx];
  const modeName = test&&test.mode==="ko" ? "뜻 말하기 시험" : "단어 말하기 시험";
  if(!srSupported()){
    return `
      <header><button class="backbtn" data-modes>‹ 뒤로</button><h1>${esc(s.pages)}</h1></header>
      <div class="speak-test"><div class="notice">
        😢 이 브라우저는 <b>음성 인식</b>을 지원하지 않아요.<br>
        아이폰은 <b>사파리</b>, 안드로이드·PC는 <b>크롬</b>에서 열면 마이크 채점이 됩니다.
      </div><button class="stbtn solid" data-go="study">단어 학습으로 가기</button></div>`;
  }
  if(!test) return "";
  if(test.phase==="done"){
    const total=test.qs.length, score=test.results.filter(r=>r&&r.ok).length;
    const pct=Math.round(score/total*100);
    // 최고 점수 저장 (전체 세트 시험일 때만)
    if(!test.retryWrong) setBest(s.key, test.mode, pct);
    // 시험 기록 저장 (이 결과 화면당 1회만)
    if(!test.saved){
      addHistory({date:todayStr(), pages:s.pages, topic:s.topic,
        mode:test.mode, modeName:modeName, score, total, pct, retry:!!test.retryWrong});
      test.saved=true;
      try{gam_record({kind:"test",setKey:s.key,pages:s.pages,topic:s.topic,results:test.results.map(r=>({w:r.w.w,ok:r.ok})),score,total});}catch(_){}
    }
    const best=bestScore(s.key,test.mode);
    const wrong=test.results.filter(r=>r&&!r.ok).map(r=>r.w);
    const rev=test.results.map(r=>`
      <div class="rvrow ${r.ok?'ok':'no'}"><div class="rok">${r.ok?'✓':'✕'}</div>
        <div class="rw"><b>${esc(r.w.w)}</b><span>${esc(r.w.mean)}</span></div>
        <button class="star sm ${isFav(s.key,r.w.w)?'on':''}" data-fav="${esc(r.w.w)}">${isFav(s.key,r.w.w)?'★':'☆'}</button>
        <button class="rspk" data-speak="${esc(r.w.w)}" data-lang="en">${ICON_SPK_SM}</button></div>`).join("");
    return `
      <header><button class="backbtn" data-modes>‹ 뒤로</button><h1>${esc(s.pages)} 결과</h1>
        <div class="sub">${modeName}${test.retryWrong?' · 틀린 단어 재시험':''}</div></header>
      <div class="speak-test"><div class="stresult">
        <div class="score">${score} / ${total}</div>
        <div class="lbl">${score===total?'완벽해요! 🎉':score>=total*0.7?'아주 잘했어요! 👏':'조금만 더 연습해봐요 💪'}</div>
        ${best!==null?`<div class="bestline">이 시험 최고 기록: <b>${best}점</b></div>`:''}
        <button class="stbtn send" data-share style="margin-top:20px; width:100%;">📤 부모님께 결과 보내기</button>
        ${wrong.length?`<button class="stbtn solid" data-retrywrong style="margin-top:10px; width:100%;">✕ 틀린 단어 ${wrong.length}개만 다시 풀기</button>`:''}
        <button class="stbtn ${wrong.length?'ghost':'ghost'}" data-retry style="margin-top:10px; width:100%;">전체 다시 도전</button>
        <div class="review"><h4>단어별 결과 (★로 저장 · 스피커로 발음)</h4>${rev}</div>
      </div></div>`;
  }
  const q=test.qs[test.i];
  const pct=Math.round((test.i)/test.qs.length*100);
  const isKo = test.mode==="ko";
  // 문제 표시: ko모드=영어단어 보여주고 한글 답 / en모드=한글뜻 보여주고 영어 답
  const showWord = isKo ? q.w : q.mean;
  const prompt = isKo ? "이 단어의 뜻을 한글로 말하세요" : "이 뜻의 영어 단어를 말하세요";
  const answerText = isKo ? q.mean : q.w;

  let feedback="";
  if(test.phase==="ready"){
    feedback=`<button class="micbtn" data-mic><span>${ICON_MIC}</span></button>
      <div class="miclabel">마이크를 누르고 ${isKo?'한글 뜻을':'영어로'} 말하세요</div>
      <div class="ordiv"><span>또는 직접 입력</span></div>
      <div class="typerow">
        <input class="typein" id="typein" type="text" autocomplete="off" autocapitalize="off" autocorrect="off"
          inputmode="${isKo?'text':'latin'}" placeholder="${isKo?'한글 뜻을 입력':'영어 단어를 입력'}" />
        <button class="typebtn" data-submit>제출</button>
      </div>`;
  } else if(test.phase==="recording"){
    feedback=`<button class="micbtn recording" data-mic><span>${ICON_MIC}</span></button>
      <div class="miclabel">🔴 듣고 있어요… 말한 뒤 잠시 기다리세요</div>`;
  } else if(test.phase==="error"){
    feedback=`
      <div class="micerror">${esc(test.errMsg||"인식에 실패했어요.").replace(/\n/g,"<br>")}</div>
      <div class="ordiv"><span>마이크 대신 직접 입력</span></div>
      <div class="typerow">
        <input class="typein" id="typein" type="text" autocomplete="off" autocapitalize="off" autocorrect="off"
          inputmode="${isKo?'text':'latin'}" placeholder="${isKo?'한글 뜻을 입력':'영어 단어를 입력'}" />
        <button class="typebtn" data-submit>제출</button>
      </div>
      <div class="stbtns" style="margin-top:12px;">
        <button class="stbtn ghost" data-mic>🎤 다시 시도</button>
        <button class="stbtn solid" data-skip2>이 문제 넘기기 →</button>
      </div>`;
  } else {
    feedback=`
      <div class="heard">내 답: <b>${esc(test.heard||"(입력 없음)")}</b></div>
      <div class="verdict ${test.ok?'ok':'no'}">${test.ok?'✓ 정답!':'✕ 다시 도전'}</div>
      <div class="answer">정답: <b>${esc(answerText)}</b></div>
      <div class="stbtns">
        <button class="stbtn ghost" data-mic>🎤 다시 말하기</button>
        <button class="stbtn solid" data-next>${test.i+1===test.qs.length?'결과 보기':'다음 →'}</button>
      </div>`;
  }
  const tip = isKo
    ? '💡 뜻이 여러 개면 하나만 말해도 정답이에요.'
    : '💡 발음이 조금 달라도 비슷하면 정답 처리돼요.';
  return `
    <header><button class="backbtn" data-modes>‹ 뒤로</button>
      <h1>${esc(s.pages)} · ${modeName}</h1>
      <div class="sub">${isKo?'영어 단어 → 한글 뜻 말하기':'한글 뜻 → 영어 단어 말하기'}</div></header>
    <div class="speak-test"><div class="stcard">
      <div class="stprog">${test.i+1} / ${test.qs.length}</div>
      <div class="stbar"><i style="width:${pct}%"></i></div>
      <div class="stq-label ${isKo?'e':'k'}">${isKo?'ENGLISH':'KOREAN'}</div>
      <div class="stprompt">${prompt}</div>
      <div class="stword ${isKo?'':'kor'}">${esc(showWord)}</div>
      <div class="stpos">${esc(q.pos)}</div>
      ${isKo?`<button class="stlisten" data-speak="${esc(q.w)}" data-lang="en">${ICON_SPK_SM} 단어 발음 듣기</button>`:''}
      ${feedback}
      ${(test.phase==="ready"||test.phase==="recording")?`<button class="skip" data-skip>모르겠어요 (넘기기)</button>`:''}
      ${test.phase==="ready"?`<div class="tip">${tip}</div>`:''}
    </div></div>`;
}

function micErrorMsg(err){
  switch(err){
    case "not-allowed":
    case "service-not-allowed":
      return "마이크 권한이 꺼져 있어요. 브라우저 주소창의 자물쇠(또는 ⋮ 메뉴)에서 마이크를 '허용'으로 바꿔 주세요.";
    case "no-speech":
      return "소리가 잘 안 들렸어요. 마이크 가까이에서 또박또박 말해 주세요.";
    case "audio-capture":
      return "마이크를 찾을 수 없어요. 다른 앱이 마이크를 쓰고 있지 않은지 확인해 주세요.";
    case "network":
      return "인터넷 연결을 확인해 주세요. (음성 인식은 인터넷이 필요해요.)";
    case "aborted":
      return "인식이 중단됐어요. 다시 눌러 주세요.";
    default:
      return "인식에 실패했어요. 다시 시도해 주세요.";
  }
}
function submitTyping(){
  const el=document.getElementById("typein");
  if(!el) return;
  const val=(el.value||"").trim();
  if(!val){ el.focus(); return; }
  const q=test.qs[test.i];
  const isKo=test.mode==="ko";
  const m = isKo ? matchKo(q.mean, [val], q.w, false) : matchEn(q.w, [val], true);
  test.heard=val; test.ok=m.ok; test.phase="result";
  render();
  if(m.ok) speak(q.w, null, "en");
}
function recordOnce(){
  if(recording)return;
  // 안전장치: 로컬 파일(file://)에서는 크롬이 마이크를 막음
  if(location.protocol==="file:"){
    test.phase="error";
    test.errMsg="⚠️ 파일을 직접 열면 마이크가 막혀요.\n\n해결법: 이 파일을 구글 드라이브에 올려 열거나, 학교/집 PC에서 열 때는 크롬 대신 '엣지(Edge)' 브라우저로 열어 보세요. 아이폰은 사파리에서 대체로 동작합니다.";
    render(); return;
  }
  const q=test.qs[test.i];
  const isKo=test.mode==="ko";
  try{ recog=new SR(); }
  catch(e){ test.phase="error"; test.errMsg="이 브라우저에서 음성 인식을 시작할 수 없어요. 크롬(안드로이드·PC) 또는 사파리(아이폰)에서 열어 주세요."; render(); return; }
  recog.lang = isKo ? "ko-KR" : "en-US";
  recog.interimResults=false; recog.maxAlternatives=5;
  recording=true; test.phase="recording"; test.errMsg=""; render();
  let got=false;
  recog.onresult=(e)=>{
    got=true;
    const alts=[];
    for(let i=0;i<e.results[0].length;i++)alts.push(e.results[0][i].transcript);
    const m = isKo ? matchKo(q.mean, alts, q.w, true) : matchEn(q.w, alts);
    test.heard=alts[0]; test.ok=m.ok; test.phase="result";
    recording=false; render();
    if(m.ok) speak(q.w, null, "en"); // 정답이면 영어 발음 들려주기
  };
  recog.onerror=(e)=>{
    recording=false;
    if(e.error==="no-speech"){
      // 말을 안 한 경우는 오답이 아니라 '다시 시도' 안내
      test.phase="error"; test.errMsg=micErrorMsg(e.error);
    } else {
      test.phase="error"; test.errMsg=micErrorMsg(e.error);
    }
    render();
  };
  recog.onend=()=>{ if(!got&&recording){recording=false; if(test.phase==="recording"){test.phase="error"; test.errMsg="소리가 인식되지 않았어요. 마이크를 누르고 다시 말해 주세요.";} render();} };
  try{recog.start();}
  catch(err){ recording=false; test.phase="error"; test.errMsg="마이크를 시작할 수 없어요. 잠시 후 다시 눌러 주세요."; render(); }
}

function bind(){
  const app=document.getElementById("app");
  app.onclick=(e)=>{
    const t=e.target.closest("[data-set],[data-home],[data-modes],[data-go],[data-test],[data-exquiz],[data-exopt],[data-exnext],[data-exretry],[data-exhint],[data-w],[data-speak],[data-mic],[data-submit],[data-next],[data-skip],[data-skip2],[data-retry],[data-retrywrong],[data-fav],[data-studyall],[data-studyfav],[data-share],[data-history],[data-setname],[data-workbook],[data-review],[data-challenge],[data-badges],[data-revshow],[data-revgrade],[data-chopt],[data-chnext],[data-mute]");
    if(!t)return;
    if(t.hasAttribute("data-speak")){ e.stopPropagation(); speak(t.getAttribute("data-speak"), t, t.getAttribute("data-lang")||"en"); return; }
    if(t.hasAttribute("data-exquiz")){ startExQuiz(t.getAttribute("data-exquiz")); state.view="exquiz"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-exopt")){
      if(exquiz.picked!==null) return;
      const pick=t.getAttribute("data-exopt"); const q=exquiz.qs[exquiz.i];
      exquiz.picked=pick; const ok=(pick===q.answer); if(ok)exquiz.score++;
      exquiz.results[exquiz.i]={word:q.word, ok};
      render();
      // 정답 여부와 상관없이 예문 전체를 읽어줌 (학습 강화)
      speak(q.word.ex, null, "en"); return;
    }
    if(t.hasAttribute("data-exhint")){ exquiz.showHint=true; render(); return; }
    if(t.hasAttribute("data-exnext")){
      if(exquiz.i+1>=exquiz.qs.length){ exquiz.done=true; }
      else { exquiz.i++; exquiz.picked=null; exquiz.showHint=false; }
      scrollTo(0,0); render(); return;
    }
    if(t.hasAttribute("data-exretry")){ startExQuiz(exquiz.kind); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-fav")){ e.stopPropagation(); toggleFav(SETS[state.setIdx].key, t.getAttribute("data-fav")); render(); return; }
    if(t.hasAttribute("data-studyall")){ state.studyFav=false; render(); return; }
    if(t.hasAttribute("data-studyfav")){ state.studyFav=true; render(); return; }
    if(t.hasAttribute("data-submit")){ submitTyping(); return; }
    if(t.hasAttribute("data-set")){ state.setIdx=+t.getAttribute("data-set"); state.view="modes"; state.studyFav=false; test=null; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-home")){ state.view="home"; test=null; abortRec(); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-modes")){ state.view="modes"; test=null; abortRec(); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-go")){ state.view=t.getAttribute("data-go"); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-test")){ startTest(t.getAttribute("data-test")); state.view="test"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-w")){ t.classList.toggle("open"); return; }
    if(t.hasAttribute("data-mic")){ recordOnce(); return; }
    if(t.hasAttribute("data-skip")){ test.results[test.i]={w:test.qs[test.i],ok:false,heard:"(넘김)"}; advance(); return; }
    if(t.hasAttribute("data-skip2")){ test.results[test.i]={w:test.qs[test.i],ok:false,heard:"(넘김)"}; advance(); return; }
    if(t.hasAttribute("data-next")){ test.results[test.i]={w:test.qs[test.i],ok:!!test.ok,heard:test.heard||""}; advance(); return; }
    if(t.hasAttribute("data-retry")){ startTest(test.mode); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-retrywrong")){ const wrong=test.results.filter(r=>r&&!r.ok).map(r=>r.w); startTest(test.mode, wrong); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-share")){ shareResult(); return; }
    if(t.hasAttribute("data-history")){ state.view="history"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-workbook")){ state.view="workbook"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-review")){ startReview(); state.view="review"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-challenge")){ startChallenge(); state.view="challenge"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-badges")){ state.view="badges"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-revshow")){ review.show=true; render(); return; }
    if(t.hasAttribute("data-revgrade")){ reviewGrade(t.getAttribute("data-revgrade")==="1"); return; }
    if(t.hasAttribute("data-chopt")){ challengePick(t.getAttribute("data-chopt")); return; }
    if(t.hasAttribute("data-chnext")){ challengeNext(); return; }
    if(t.hasAttribute("data-mute")){ store.mute=!store.mute; saveStore(); render(); return; }
    if(t.hasAttribute("data-setname")){ askName(); return; }
  };
  // 타이핑 입력창: 엔터로 제출
  const typein=document.getElementById("typein");
  if(typein){
    typein.onkeydown=(e)=>{ if(e.key==="Enter"){ e.preventDefault(); submitTyping(); } };
  }
}
function abortRec(){ if(recog){try{recog.abort()}catch(_){}} recording=false; }
function advance(){
  if(test.i+1>=test.qs.length){ test.phase="done"; }
  else{ test.i++; test.phase="ready"; test.heard=""; test.ok=null; }
  scrollTo(0,0); render();
}
render();
</script>
</body>
</html>
