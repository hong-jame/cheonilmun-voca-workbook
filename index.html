<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>천일문 VOCA 중등 필수 · 단어장 + 워크북</title>
<style>
  :root{
    --navy:#1F3864; --navy2:#2c4d84; --light:#EDF1F8; --accent:#C05A28;
    --ink:#1a2540; --sub:#5a6b8c; --line:#d5deee; --bg:#f2f5fb; --card:#fff;
    --good:#1f8a5b; --goodbg:#e7f6ee; --bad:#d9534f; --badbg:#fdecec;
    --eng:#1F3864; --kor:#8a4b16;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Apple SD Gothic Neo","맑은 고딕","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh; overscroll-behavior:none;}
  .wrap{max-width:560px; margin:0 auto; padding:0 0 40px; min-height:100vh;}

  header{background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:20px 20px 18px; position:sticky; top:0; z-index:20; box-shadow:0 2px 14px rgba(31,56,100,.25);}
  header h1{margin:0; font-size:20px; font-weight:800; letter-spacing:-.3px; display:flex; align-items:center; gap:8px;}
  header .sub{margin-top:4px; font-size:12.5px; color:#c9d6ef; font-weight:500;}
  .backbtn{background:rgba(255,255,255,.15); border:none; color:#fff; font-size:14px;
    padding:7px 13px; border-radius:20px; font-weight:700; cursor:pointer; margin-bottom:10px;}
  .backbtn:active{background:rgba(255,255,255,.28);}

  .setgrid{padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:11px;}
  .setcard{background:var(--card); border:1px solid var(--line); border-radius:15px; padding:15px 14px;
    cursor:pointer; transition:transform .12s; display:flex; flex-direction:column; gap:6px; position:relative; overflow:hidden;}
  .setcard:active{transform:scale(.97);}
  .setcard .pg{font-size:12px; font-weight:800; color:var(--navy);}
  .setcard .tp{font-size:13.5px; font-weight:700; line-height:1.35; min-height:36px;}
  .setcard .cnt{font-size:11.5px; color:var(--sub); font-weight:600; display:flex; flex-wrap:wrap; gap:4px; align-items:center;}
  .badge-best{background:#e7f0ff; color:var(--navy); font-weight:800; font-size:10px; padding:1px 6px; border-radius:5px;}
  .badge-fav{background:#fff3d6; color:#a8730a; font-weight:800; font-size:10px; padding:1px 6px; border-radius:5px;}
  .star{width:38px; height:44px; border:none; background:none; color:#e0b100; font-size:23px; cursor:pointer; flex-shrink:0; line-height:1; padding:0;}
  .star:not(.on){color:#c7cede;}
  .star:active{transform:scale(.85);}
  .star.sm{width:30px; height:30px; font-size:18px;}
  .studybar{display:flex; gap:8px; padding:2px 2px 12px;}
  .emptyfav{text-align:center; color:var(--sub); font-size:13.5px; line-height:1.7; padding:50px 20px;}
  .chip{border:1px solid var(--line); background:#fff; color:var(--navy); font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:20px; cursor:pointer;}
  .chip.on{background:var(--navy); color:#fff; border-color:var(--navy);}
  .chip:active{transform:scale(.96);}
  .bestline{font-size:13px; color:var(--sub); margin-top:10px; font-weight:600;}
  .bestline b{color:var(--navy);}
  .mbest{display:inline-block; margin-left:6px; font-size:11px; font-weight:800; color:#a8730a; background:#fff3d6; padding:2px 7px; border-radius:6px; vertical-align:middle;}
  .stbtn.send{background:linear-gradient(135deg,#1f8a5b,#26a56b); color:#fff;}
  .homehead{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .histbtn{background:rgba(255,255,255,.16); border:none; color:#fff; font-size:12.5px; font-weight:800;
    padding:8px 12px; border-radius:20px; cursor:pointer; flex-shrink:0;}
  .histbtn:active{background:rgba(255,255,255,.28);}
  .namebar{display:flex; align-items:center; justify-content:space-between; gap:10px; background:#fff;
    border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:13px; color:var(--sub);}
  .namebar b{color:var(--ink);}
  .hrow{display:flex; align-items:center; justify-content:space-between; gap:12px; background:#fff;
    border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:9px;}
  .hpages{font-size:14px; font-weight:800; color:var(--ink);}
  .htopic{font-size:12px; font-weight:600; color:var(--sub); margin-left:4px;}
  .hmeta{font-size:11.5px; color:var(--sub); margin-top:3px;}
  .hscore{font-size:17px; font-weight:800; text-align:right; flex-shrink:0;}
  .hscore span{display:block; font-size:11px; font-weight:700;}
  .hscore.good{color:var(--good);} .hscore.low{color:#c96a2e;}
  .toast{position:fixed; left:50%; bottom:32px; transform:translateX(-50%) translateY(20px);
    background:#222c44; color:#fff; font-size:13.5px; font-weight:600; padding:13px 18px; border-radius:12px;
    max-width:88%; text-align:center; opacity:0; pointer-events:none; transition:.28s; z-index:100; line-height:1.5;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .modal{position:fixed; inset:0; background:rgba(20,30,55,.55); display:flex; align-items:center;
    justify-content:center; padding:22px; z-index:120;}
  .modalbox{background:#fff; border-radius:18px; padding:20px; width:100%; max-width:420px;}
  .modaltitle{font-size:16px; font-weight:800; color:var(--navy); margin-bottom:12px;}
  .modalta{width:100%; height:150px; border:1.5px solid var(--line); border-radius:12px; padding:12px;
    font-size:14px; font-family:inherit; line-height:1.6; color:var(--ink); resize:none; margin-bottom:8px;}
  .modalhint{font-size:12px; color:var(--sub); margin-bottom:14px; line-height:1.5;}
  .setcard .bar{position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--navy);}

  .intro{padding:18px 18px 4px;}
  .intro h2{margin:0 0 5px; font-size:16px; color:var(--navy);}
  .intro p{margin:0; font-size:13px; color:var(--sub); line-height:1.6;}

  .modes{padding:16px; display:flex; flex-direction:column; gap:12px;}
  .modecard{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px;
    cursor:pointer; display:flex; align-items:center; gap:14px;}
  .modecard:active{transform:scale(.98);}
  .modeicon{width:48px; height:48px; border-radius:13px; background:var(--light); color:var(--navy);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .modeicon svg{width:26px; height:26px;}
  .modeicon.kor{background:#f6ece1; color:var(--kor);}
  .modeicon.quiz{background:#e6f0ea; color:#1f8a5b;}
  .badge.q{background:#e0f0e8; color:#1f8a5b;}
  .quiz{padding:20px 18px 40px;}
  .qcard{background:#fff; border:1px solid var(--line); border-radius:20px; padding:24px 20px; box-shadow:0 2px 12px rgba(31,56,100,.07);}
  .qprog{font-size:12.5px; color:var(--sub); font-weight:700; margin-bottom:8px; text-align:center;}
  .qbar{height:6px; background:var(--light); border-radius:4px; overflow:hidden; margin-bottom:20px;}
  .qbar > i{display:block; height:100%; background:#1f8a5b; transition:width .3s;}
  .exprompt{font-size:20px; font-weight:700; line-height:1.5; color:var(--ink); text-align:center; margin-bottom:8px; word-break:keep-all;}
  .exprompt.small{font-size:17px; font-weight:600;}
  .exhint{text-align:center; font-size:13px; color:var(--sub); margin-bottom:16px;}
  .exhint b{color:var(--navy);}
  .hintbtn{display:block; margin:0 auto 16px; background:#fff7e6; border:1px solid #ffe0a3; color:#9a6a00;
    font-size:13.5px; font-weight:700; padding:9px 18px; border-radius:20px; cursor:pointer;}
  .hintbtn:active{background:#ffefcc;}
  .stlisten{display:block; margin:0 auto 14px; background:none; border:none; color:var(--navy2); font-size:13px; font-weight:700; cursor:pointer;}
  .exopts{display:flex; flex-direction:column; gap:10px; margin-top:8px;}
  .exopt{border:1.5px solid var(--line); background:#fff; border-radius:13px; padding:15px; font-size:15.5px; font-weight:700; color:var(--ink); cursor:pointer; text-align:center; transition:.12s; word-break:keep-all; line-height:1.4;}
  .exopt:active{transform:scale(.98);}
  .exopt.correct{background:#e7f6ee; border-color:var(--good); color:var(--good);}
  .exopt.wrong{background:#fdecec; border-color:var(--bad); color:var(--bad);}
  .qnext{margin-top:16px; width:100%; padding:15px; border:none; border-radius:13px; background:var(--navy); color:#fff; font-size:15px; font-weight:800; cursor:pointer;}
  .qnext:disabled{opacity:.4;}
  .modecard h3{margin:0 0 3px; font-size:16px;}
  .modecard p{margin:0; font-size:12.5px; color:var(--sub); line-height:1.45;}
  .badge{display:inline-block; font-size:10.5px; font-weight:800; padding:2px 7px; border-radius:6px; margin-left:6px; vertical-align:middle;}
  .badge.e{background:#e6edfa; color:var(--navy);}
  .badge.k{background:#f6ece1; color:var(--kor);}

  .list{padding:14px 14px 0;}
  .word{background:var(--card); border:1px solid var(--line); border-radius:16px; margin-bottom:11px; overflow:hidden;}
  .word .top{display:flex; align-items:center; gap:12px; padding:15px 16px; cursor:pointer;}
  .word .num{min-width:30px; height:30px; border-radius:9px; background:var(--light); color:var(--navy);
    font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .word .main{flex:1; min-width:0;}
  .word .en{font-size:19px; font-weight:800; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .word .pos{font-size:11.5px; color:var(--sub); font-weight:700; background:#eef2f9; padding:2px 7px; border-radius:6px;}
  .word .ko{font-size:14.5px; color:var(--navy); font-weight:700; margin-top:3px;}
  .speak{width:44px; height:44px; border-radius:50%; border:none; flex-shrink:0;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 3px 10px rgba(31,56,100,.3);}
  .speak:active{transform:scale(.88);}
  .speak.playing{animation:pulse .7s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
  .speak svg{width:22px; height:22px;}
  .word .ex{padding:0 16px 15px 58px; border-top:1px solid var(--line); display:none;}
  .word.open .ex{display:block; padding-top:12px;}
  .word .exrow{display:flex; align-items:flex-start; gap:9px; margin-top:9px;}
  .word .exen{font-size:14px; line-height:1.5; flex:1;}
  .word .exko{font-size:12.5px; line-height:1.5; color:var(--sub); margin-top:3px;}
  .exspeak{width:32px; height:32px; border-radius:50%; border:1px solid var(--line); background:#fff;
    color:var(--navy); display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer;}
  .exspeak svg{width:15px; height:15px;}
  .exspeak.playing{background:var(--navy); color:#fff; animation:pulse .7s infinite;}

  .speak-test{padding:20px 18px 40px;}
  .stcard{background:#fff; border:1px solid var(--line); border-radius:20px; padding:28px 22px; text-align:center;
    box-shadow:0 2px 12px rgba(31,56,100,.07);}
  .stprog{font-size:12.5px; color:var(--sub); font-weight:700; margin-bottom:6px;}
  .stbar{height:6px; background:var(--light); border-radius:4px; overflow:hidden; margin-bottom:22px;}
  .stbar > i{display:block; height:100%; background:var(--navy); transition:width .3s;}
  .stq-label{font-size:12px; font-weight:800; letter-spacing:.3px; padding:3px 10px; border-radius:20px; display:inline-block; margin-bottom:12px;}
  .stq-label.e{background:#e6edfa; color:var(--navy);}
  .stq-label.k{background:#f6ece1; color:var(--kor);}
  .stprompt{font-size:15px; color:var(--sub); font-weight:600; margin-bottom:4px;}
  .stword{font-size:34px; font-weight:800; letter-spacing:-.5px; margin-bottom:4px; word-break:break-word; line-height:1.2;}
  .stword.kor{color:var(--kor);}
  .stpos{font-size:12px; color:var(--sub); font-weight:700; margin-bottom:8px;}
  .stlisten{background:none; border:none; color:var(--navy2); font-size:13px; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; gap:5px; margin-bottom:22px;}
  .stlisten svg{width:15px;height:15px;}

  .micbtn{width:96px; height:96px; border-radius:50%; border:none; margin:0 auto 14px; display:block;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; cursor:pointer;
    box-shadow:0 6px 20px rgba(31,56,100,.35); transition:transform .1s;}
  .micbtn:active{transform:scale(.93);}
  .micbtn svg{width:42px; height:42px;}
  .micbtn.recording{background:linear-gradient(135deg,#d9534f,#e5695f); animation:mic 1.1s infinite;}
  @keyframes mic{0%,100%{box-shadow:0 6px 20px rgba(217,83,79,.4);}50%{box-shadow:0 6px 30px rgba(217,83,79,.75);}}
  .miclabel{font-size:13px; color:var(--sub); font-weight:600; min-height:20px; margin-bottom:14px;}
  .micerror{background:#fff4e6; border:1px solid #ffd9a8; color:#9a5b00; border-radius:12px;
    padding:14px 16px; font-size:13.5px; line-height:1.6; margin-bottom:16px; text-align:left;}
  .ordiv{display:flex; align-items:center; gap:10px; margin:6px 0 12px; color:var(--sub); font-size:12px; font-weight:600;}
  .ordiv::before,.ordiv::after{content:""; flex:1; height:1px; background:var(--line);}
  .typerow{display:flex; gap:8px;}
  .typein{flex:1; border:1.5px solid var(--line); border-radius:12px; padding:14px 14px; font-size:16px;
    font-family:inherit; color:var(--ink); outline:none; min-width:0;}
  .typein:focus{border-color:var(--navy);}
  .typebtn{border:none; border-radius:12px; padding:0 20px; background:var(--navy); color:#fff;
    font-size:15px; font-weight:800; cursor:pointer; flex-shrink:0;}
  .typebtn:active{transform:scale(.97);}

  .heard{font-size:13px; color:var(--sub); margin-bottom:10px; min-height:18px;}
  .heard b{color:var(--ink);}
  .verdict{font-size:20px; font-weight:800; margin-bottom:6px; min-height:26px;}
  .verdict.ok{color:var(--good);} .verdict.no{color:var(--bad);}
  .answer{font-size:13px; color:var(--sub); margin-bottom:16px;}
  .answer b{color:var(--ink);}

  .stbtns{display:flex; gap:10px;}
  .stbtn{flex:1; padding:14px; border:none; border-radius:13px; font-size:15px; font-weight:800; cursor:pointer;}
  .stbtn.ghost{background:#fff; border:1.5px solid var(--line); color:var(--navy);}
  .stbtn.solid{background:var(--navy); color:#fff;}
  .stbtn:active{transform:scale(.98);}

  .stresult{text-align:center; padding:20px 4px;}
  .stresult .score{font-size:46px; font-weight:800; color:var(--navy);}
  .stresult .lbl{font-size:14px; color:var(--sub); margin-top:6px;}
  .review{margin-top:22px; text-align:left;}
  .review h4{font-size:13px; color:var(--sub); margin:0 0 8px;}
  .rvrow{display:flex; align-items:center; gap:10px; padding:11px 13px; background:#fff; border:1px solid var(--line);
    border-radius:11px; margin-bottom:7px;}
  .rvrow .rok{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0;}
  .rvrow.ok .rok{background:var(--good);} .rvrow.no .rok{background:var(--bad);}
  .rvrow .rw{flex:1; min-width:0;}
  .rvrow .rw b{font-weight:800; font-size:14.5px;}
  .rvrow .rw span{display:block; font-size:12.5px; color:var(--sub);}
  .rvrow .rspk{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .rvrow .rspk svg{width:14px;height:14px;}

  .notice{background:#fff4e6; border:1px solid #ffd9a8; color:#9a5b00; border-radius:12px;
    padding:14px 16px; font-size:13px; line-height:1.6; margin:16px 0;}
  .skip{background:none;border:none;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;text-decoration:underline;margin-top:14px;}
  .tip{font-size:11.5px; color:var(--sub); margin-top:14px; line-height:1.5;}

/* ===== 워크북(스코프) ===== */
.wbwrap{
    --ink:#1a1a1a; --muted:#666; --line:#d9d9d9; --soft:#f4f4f2;
    --accent:#2f6f4e; --accent-soft:#e7f1ea; --warn:#b45309; --warn-soft:#fdf1e3;
    --blank:#9aa0a6;
  }
.wbwrap *{box-sizing:border-box;}
.wbwrap{-webkit-print-color-adjust:exact; print-color-adjust:exact;}
.wbwrap{
    font-family:"Malgun Gothic","맑은 고딕",system-ui,"Segoe UI",sans-serif;
    color:var(--ink); line-height:1.6; margin:0; background:#ececea;
    font-size:15px;
  }
.wbwrap .sheet{
    max-width:820px; margin:24px auto; background:#fff; padding:38px 44px;
    box-shadow:0 2px 14px rgba(0,0,0,.08); border-radius:4px;
  }
.wbwrap .book{font-size:12px; color:var(--muted); letter-spacing:.3px;}
.wbwrap h1{font-size:23px; margin:4px 0 2px; letter-spacing:-.3px;}
.wbwrap .sub{font-size:13px; color:var(--accent); font-weight:700; margin-bottom:14px;}
.wbwrap .meta{
    display:flex; gap:0; border:1px solid var(--line); border-radius:6px;
    overflow:hidden; margin:14px 0 6px; font-size:13px;
  }
.wbwrap .meta div{flex:1; padding:8px 12px; border-right:1px solid var(--line);}
.wbwrap .meta div:last-child{border-right:none;}
.wbwrap .meta b{color:var(--muted); font-weight:600; margin-right:8px;}
.wbwrap .tip{
    font-size:12.5px; color:var(--muted); background:var(--soft);
    border-radius:6px; padding:9px 13px; margin:12px 0 0;
  }
.wbwrap .part{margin-top:30px;}
.wbwrap .part-h{
    display:flex; align-items:center; gap:10px;
    border-bottom:2px solid var(--accent); padding-bottom:6px; margin-bottom:4px;
  }
.wbwrap .badge{
    background:var(--accent); color:#fff; font-size:13px; font-weight:700;
    padding:3px 11px; border-radius:20px; white-space:nowrap;
  }
.wbwrap .part-h h2{font-size:17px; margin:0;}
.wbwrap .howto{font-size:12.5px; color:var(--muted); margin:6px 0 14px;}
.wbwrap .q{margin:0 0 17px; padding-left:2px; page-break-inside:avoid;}
.wbwrap .q .num{font-weight:700; color:var(--accent); margin-right:6px;}
.wbwrap .ko{color:#333;}
.wbwrap .cond{font-size:12.5px; color:var(--muted);}
.wbwrap .chip{
    display:inline-block; font-family:"Consolas",monospace; font-size:13.5px;
    background:var(--soft); border:1px solid var(--line); border-radius:5px;
    padding:2px 9px; margin:4px 5px 0 0;
  }
.wbwrap .chip.trap-note{border-style:dashed;}
.wbwrap .tokens{margin-top:6px;}
.wbwrap .given{
    font-family:"Consolas",monospace; background:var(--accent-soft);
    border-radius:4px; padding:1px 7px; font-weight:700; color:var(--accent);
  }
.wbwrap .u-line{
    border-bottom:1.4px solid var(--blank); min-height:1.6em; margin-top:8px;
  }
.wbwrap .u-line.short{display:inline-block; min-width:120px; border-bottom:1.4px solid var(--blank);}
.wbwrap .blank{
    display:inline-block; min-width:82px; border-bottom:1.4px solid var(--blank);
    text-align:center; margin:0 2px;
  }
.wbwrap .underline{border-bottom:1.4px solid var(--ink); font-weight:600;}
.wbwrap .warn-tag{
    font-size:11px; font-weight:700; color:var(--warn); background:var(--warn-soft);
    border:1px solid #f0d9b8; border-radius:4px; padding:1px 7px; margin-left:6px;
  }
.wbwrap .sent{margin-top:3px;}
.wbwrap .dnd .bank{margin-top:8px; display:flex; flex-wrap:wrap; gap:7px;}
.wbwrap .dnd .chip{cursor:grab; user-select:none; -webkit-user-select:none; touch-action:none;}
.wbwrap .dnd .chip:active{cursor:grabbing;}
.wbwrap .chip.dragging{opacity:.28;}
.wbwrap .chip.ghost{
    position:fixed; z-index:1000; margin:0; pointer-events:none;
    transform:translate(-50%,-50%); opacity:.96;
    background:#fff; border-color:var(--accent); color:var(--accent);
    box-shadow:0 8px 18px rgba(0,0,0,.28);
  }
.wbwrap .answer-zone{
    margin-top:8px; min-height:48px; border:1.8px dashed var(--accent);
    border-radius:9px; background:var(--accent-soft); padding:9px 11px;
    display:flex; flex-wrap:wrap; gap:7px; align-items:center;
  }
.wbwrap .answer-zone.empty::before{
    content:attr(data-ph); color:var(--blank); font-size:12.5px; font-style:italic;
  }

때 턱이 아프다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">jaw<\/span><span class=\"chip\">hurts<\/span><span class=\"chip\">when<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"There are more female students in my class.|There are more female students in my class than before.\" data-example=\"There are more female students in my class.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">내 반에는 여학생이 더 많다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">more<\/span><span class=\"chip\">female students<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 01 「No.0001~0040」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>I run every day to lose weight<\/b><\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적은 &#x27;to+동사원형&#x27;으로 나타내! 그래서 lose 앞에 to를 붙이는 거야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>She welcomed us with a friendly smile<\/b><\/span><div class=\"point\">과거에 일어난 일이니까 welcome을 과거형 welcomed로 써야 해. -ed 잊지 마!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>She wears a watch on her wrist<\/b><\/span><div class=\"point\">주어가 She(3인칭 단수)라서 현재형 동사에 -s를 붙여 wears가 돼!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>The females are larger than males<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: more ✗)<\/span><div class=\"point\">&#x27;~보다 더 큰&#x27;은 large를 비교급 larger로! large는 짧은 단어라 more를 붙이지 않고 -er을 붙여.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> do → <span class=\"sol\"><b>does<\/b><\/span><div class=\"point\">주어 The human brain이 3인칭 단수라서 do가 아니라 does가 맞아!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> growed → <span class=\"sol\"><b>grew<\/b><\/span><div class=\"point\">grow는 불규칙 동사! 과거형은 growed가 아니라 grew야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> run → <span class=\"sol\"><b>running<\/b><\/span><div class=\"point\">after가 전치사로 쓰였을 땐 뒤에 동명사(-ing)를 써! 그래서 running이 맞아.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> should to be → <span class=\"sol\"><b>should be<\/b><\/span><div class=\"point\">조동사 should 뒤에는 to 없이 동사원형이 와! 그래서 should be가 맞아.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> win → <span class=\"sol\"><b>was won<\/b><\/span><div class=\"point\">&#x27;~에 의해 우승되었다&#x27;는 수동태! be동사(was)+과거분사로 쓰는데, win은 win-won-won이라 won이 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> pick → <span class=\"sol\"><b>Picking<\/b><\/span><div class=\"point\">문장 맨 앞 주어 자리에는 동사를 그대로 못 써! 동명사(-ing)로 바꿔 Picking이 주어가 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> put → <span class=\"sol\"><b>put<\/b><\/span><div class=\"point\">put은 과거형도 똑같이 put! 형태가 안 변하는 불규칙 동사야. yesterday가 있으니 과거로 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> meet → <span class=\"sol\"><b>met<\/b><\/span><div class=\"point\">&#x27;만난 적 있니?&#x27;는 현재완료(have+과거분사)! meet의 과거분사는 met이야.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>I know a girl who has blonde hair.<\/b><\/span><div class=\"point\">&#x27;~한 소녀&#x27;처럼 사람을 꾸며줄 땐 주격 관계대명사 who를 쓰고, 뒤 동사는 소녀에 맞춰 has!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>This is the belt that I bought yesterday.<\/b><\/span><div class=\"point\">내가 &#x27;산&#x27; 대상이 belt라서 목적격 관계대명사 that(또는 which)! 목적격은 생략도 가능해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>My jaw hurts when I chew.<\/b><\/span><div class=\"point\">&#x27;~할 때&#x27;는 접속사 when으로 두 문장을 이어! 주어 My jaw가 단수라 hurts로 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>There are more female students in my class.<\/b><\/span><div class=\"point\">many의 비교급은 불규칙! -er을 붙이지 않고 more로 바꿔 &#x27;더 많은&#x27;을 나타내.<\/div><\/div><\/div>", "day02": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"She and I have a lot in common\"><div><span class=\"num\">1.<\/span><span class=\"ko\">그녀와 나는 공통점이 많다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">in<\/span><span class=\"chip\">lot<\/span><span class=\"chip\">She<\/span><span class=\"chip\">common<\/span><span class=\"chip\">a<\/span><span class=\"chip\">and< ass=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"touching\"><div><span class=\"num\">11.<\/span> <span class=\"sent\">The movie is so <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> . You should watch it. <span class=\"given\">( touch )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"shows\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">He always <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> his emotions. <span class=\"given\">( show )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"I&#x27;ll give you some medicine that helps the pain.|I will give you some medicine that helps the pain.|Let me give you some medicine that helps the pain.\" data-example=\"I&#x27;ll give you some medicine that helps the pain.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">통증에 도움이 되는 약을 좀 드릴게요.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">medicine<\/span><span class=\"chip\">that<\/span><span class=\"chip\">help<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\" v class=\"cond\">조건: <span class=\"chip\">scared<\/span><span class=\"chip\">so<\/span><span class=\"chip\">screamed<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 02 「No.0041~0080」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>She and I have a lot in common<\/b><\/span><div class=\"point\">&#x27;A and B&#x27;는 복수 주어라서 has가 아니라 have를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>The man lost a lot of blood in the accident<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: loses ✗)<\/span><div class=\"point\">lose는 불규칙동사라 과거형이 losed가 아니라 lost야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>He is able to speak Spanish<\/b><\/span><div class=\"point\">be able to는 can과 같은 뜻! to 뒤에는 동사원형 speak를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>His travel story was very amusing<\/b><\/span><div class=\"point\">남을 재미있게 하는 거라 -ing(amusing)! 과거라서 be동사는 was.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> worst → <span class=\"sol\"><b>worse<\/b><\/span><div class=\"point\">&#x27;더 나쁜&#x27;은 비교급이라 최상급 worst가 아니라 worse! bad-worse-worst로 기억해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> leave → <span class=\"sol\"><b>left<\/b><\/span><div class=\"point\">수동태는 be동사+과거분사! leave의 과거분사는 left야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> are → <span class=\"sol\"><b>is<\/b><\/span><div class=\"point\">동명사(-ing) 주어는 하나로 봐서 단수 취급! 그래서 is를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> cheered → <span class=\"sol\"><b>to cheer<\/b><\/span><div class=\"point\">&#x27;~하려고(목적)&#x27;를 나타낼 땐 to부정사! 그래서 to cheer.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> hear → <span class=\"sol\"><b>hearing<\/b><\/span><div class=\"point\">전치사 after 뒤에는 동명사(-ing)를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> have → <span class=\"sol\"><b>had<\/b><\/span><div class=\"point\">have는 불규칙동사라 과거형이 haved가 아니라 had!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> touch → <span class=\"sol\"><b>touching<\/b><\/span><div class=\"point\">남을 감동시키는 거라서 -ing(touching)를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> show → <span class=\"sol\"><b>shows<\/b><\/span><div class=\"point\">주어가 He(3인칭 단수)라 현재형엔 -s를 붙여 shows!<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>I&#x27;ll give you some medicine that helps the pain.<\/b><\/span><div class=\"point\">앞의 명사(medicine)를 꾸며주는 주격 관계대명사 that! 뒤 동사는 medicine에 맞춰 helps.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>These are the most comfortable shoes I have.<\/b><\/span><div class=\"point\">comfortable처럼 긴 형용사의 최상급은 앞에 most를 붙여!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>She has been in tears since she heard the news.<\/b><\/span><div class=\"point\">&#x27;~한 이후로 계속&#x27;은 현재완료(has+p.p.)와 since를 함께 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>The boy was scared, so he screamed.<\/b><\/span><div class=\"point\">앞이 원인, 뒤가 결과일 땐 접속사 so로 연결해!<\/div><\/div><\/div>", "day03": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"Guide dogs are trained to help the blind\"><div><span class=\"num\">1.<\/span><span class=\"ko\">안내견은 앞을 못 보는 사람들을 돕기 위해 훈련된다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">blind<\/span><span class=\"chip\">help<\/span><span class=\"chip\">are<\/span><span class=\"chip\">dogs<\/span><span class=\"chip\">trained<\/span><span class=\"chip\">to<\/span><span class=\"chip\">Guide<\/span><span class=\"chip\">the<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"We watched the chef prepare a meal\" data-trap=\"to\"><div><span class=\"num\">2.<\/span><span class=\"ko\">우리는 주방장이 식사를 준비하는 것을 지켜보았다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요 (함정 주의!)\"><\/div><div class=\"bank\"><span class=\"chip\">a<\/span><span class=\"chip\">the<\/span><span class=\"chip\">watched<\/span><span class=\"chip\">chef<\/span><span class=\"chip\">We<\/span><span class=\"chip\">meal<\/span><span class=\"chip\">prepare<\/span><span class=\"chip\">to<\/span><\/div><di \">\n<div class=\"part-h\"><span class=\"badge\">유형 3<\/span><h2>빈칸 어형 변화 (Word Form)<\/h2><\/div>\n<div class=\"howto\">괄호 안의 <b>기본형 단어를 문장에 맞게 알맞은 형태로 바꿔<\/b> 빈칸에 입력하고 <b>확인<\/b>을 누르세요.<\/div>\n<div class=\"q iq\" data-answer=\"to write\"><div><span class=\"num\">9.<\/span> <span class=\"sent\">An author needs creativity  <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\">  a book. <span class=\"given\">( write )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"designed\"><div><span class=\"num\">10.<\/span> <span class=\"sent\">The software engineer  <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\">  a new app. <span class=\"given\">( design )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"aching\"><div><span class=\"num\">11.<\/span> <span class=\"sent\">My body is  <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\">  because of the flu. <span class=\"given\">( ache )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"helps\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">My coworker  <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\">  me a lot at work. <span class=\"given\">( help )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"He wants to become a famous movie director.|He wants to be a famous movie director.\" data-example=\"He wants to become a famous movie director.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">그는 유명한 영화감독이 되고 싶어 한다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">want<\/span><span class=\"chip\">become<\/span><span class=\"chip\">movie director<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"We must care for senior citizens.|We must take care of senior citizens.\" data-example=\"We must care for senior citizens.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">우리는 어르신들을 보살펴야 한다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">must<\/span><span class=\"chip\">care for<\/span><span class=\"chip\">senior citizens<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Drink warm water when your throat is dry.|When your throat is dry, drink warm water.\" data-example=\"Drink warm water when your throat is dry.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">목이 건조할 때는 따뜻한 물을 마셔라.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">drink<\/span><span class=\"chip\">warm water<\/span><span class=\"chip\">when<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Can this medicine cure a cold?|Can this medicine cure the cold?\" data-example=\"Can this medicine cure a cold?\"><div><span class=\"num\">16.<\/span><span class=\"ko\">이 약은 감기를 치료할 수 있나요?<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">can<\/span><span class=\"chip\">medicine<\/span><span class=\"chip\">cure<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 03 「No.0081~0120」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>Guide dogs are trained to help the blind<\/b><\/span><div class=\"point\">&#x27;훈련받는&#x27; 거니까 수동태 be동사(are)+p.p.(trained)로 써야 해! the+형용사(blind)는 &#x27;~한 사람들&#x27;이란 뜻이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>We watched the chef prepare a meal<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: to ✗)<\/span><div class=\"point\">watch 같은 지각동사 뒤에는 to 없이 동사원형(prepare)이 와! 그래서 to는 함정이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>He blew his nose into a tissue<\/b><\/span><div class=\"point\">blow의 과거형은 불규칙이라 blowed가 아니라 blew야. 꼭 외워두자!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>My twin sister and I share everything<\/b><\/span><div class=\"point\">&#x27;A and I&#x27;는 복수 주어라서 동사에 -s를 붙이지 않고 share 그대로 써!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> follow → <span class=\"sol\"><b>follows<\/b><\/span><div class=\"point\">주어가 The dog(3인칭 단수)이라서 현재형 동사에 -s를 붙여 follows가 맞아!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> lift → <span class=\"sol\"><b>lifting<\/b><\/span><div class=\"point\">전치사 after 뒤에는 동사를 그냥 못 쓰고 동명사(~ing)로 바꿔야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> fighted → <span class=\"sol\"><b>fought<\/b><\/span><div class=\"point\">fight는 불규칙 동사라 과거형이 fighted가 아니라 fought야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> respect → <span class=\"sol\"><b>respected<\/b><\/span><div class=\"point\">&#x27;존경받는&#x27; 거니까 수동태! be동사(is) 뒤에는 과거분사 respected를 써야 해.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> write → <span class=\"sol\"><b>to write<\/b><\/span><div class=\"point\">&#x27;책을 쓰기 위해&#x27;라는 목적을 나타낼 땐 to부정사(to write)를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> design → <span class=\"sol\"><b>designed<\/b><\/span><div class=\"point\">이미 끝난 일(과거)이니까 design에 -ed를 붙여 designed로 바꿔줘.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> ache → <span class=\"sol\"><b>aching<\/b><\/span><div class=\"point\">be동사(is) 뒤에 오니까 현재진행형! 동사에 -ing를 붙여 aching으로 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> help → <span class=\"sol\"><b>helps<\/b><\/span><div class=\"point\">주어 My coworker가 3인칭 단수라서 현재형 동사에 -s를 붙여 helps가 돼!<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>He wants to become a famous movie director.<\/b><\/span><div class=\"point\">want 뒤에는 to부정사(to become)를 써서 &#x27;~하고 싶다&#x27;를 나타내! 주어가 He라서 wants인 것도 잊지 마.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>We must care for senior citizens.<\/b><\/span><div class=\"point\">&#x27;~해야 한다&#x27;는 조동사 must! 조동사 뒤에는 동사원형(care)이 와.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>Drink warm water when your throat is dry.<\/b><\/span><div class=\"point\">&#x27;~할 때&#x27;는 접속사 when으로 두 문장을 연결해! 명령문이라 동사원형 Drink로 시작해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>Can this medicine cure a cold?<\/b><\/span><div class=\"point\">&#x27;~할 수 있나요?&#x27;는 조동사 can을 맨 앞으로 보내 의문문을 만들어. 뒤에는 동사원형 cure!<\/div><\/div><\/div>", "day04": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"She dreams of becoming a singer\"><div><span class=\"num\">1.<\/span><span class=\"ko\">그녀는 가수가 되는 것을 꿈꾼다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div heck=\"false\" placeholder=\"정답 입력\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"doesn&#x27;t\"><div><span class=\"num\">7.<\/span> <span class=\"sent\">The teacher <span class=\"underline\">don&#x27;t<\/span> allow cell phones in class.<\/span><\/div><div class=\"iq-row\"><span class=\"cond\">→ 고친 표현:<\/span><input type=\"text\" class=\"iq-input\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"정답 입력\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"sitting\"><div><span class=\"num\">8.<\/span> <span class=\"sent\">I don&#x27;t mind <span class=\"underline\">to sit<\/span> in the back.<\/span><\/div><div class=\"iq-row\"><span class=\"cond\">→ 고친 표현:<\/span><input type=\"text\" class=\"iq-input\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"정답 입력\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 3<\/span><h2>빈칸 어형 변화 (Word Form)<\/h2><\/div>\n<div class=\"howto\">괄호 안의 <b>기본형 단어를 문장에 맞게 알맞은 형태로 바꿔<\/b> 빈칸에 입력하고 <b>확인<\/b>을 누르세요.<\/div>\n<div class=\"q iq\" data-answer=\"shook\"><div><span class=\"num\">9.<\/span> <span class=\"sent\">I <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> the bottle hard before I opened it. <span class=\"given\">( shake )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"were bending\"><div><span class=\"num\">10.<\/span> <span class=\"sent\">The trees <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> in the wind. <span class=\"given\">( bend )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"to get\"><div><span class=\"num\">11.<\/span> <span class=\"sent\">She decided <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> a haircut. <span class=\"given\">( get )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"more beautiful\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">The mountain becomes <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> in fall. <span class=\"given\">( beautiful )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"I have already changed my mind.|I&#x27;ve already changed my mind.\" data-example=\"I have already changed my mind.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">나는 이미 내 마음을 바꿨어.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">change<\/span><span class=\"chip\">mind<\/span><span class=\"chip\">already<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"This is a puzzle that I can&#x27;t solve.|This is a puzzle which I can&#x27;t solve.|This is the puzzle that I can&#x27;t solve.\" data-example=\"This is a puzzle that I can&#x27;t solve.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">이것은 내가 풀 수 없는 퍼즐이다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">puzzle<\/span><span class=\"chip\">can&#x27;t<\/span><span class=\"chip\">solve<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"She is the most talented musician in our class.\" data-example=\"She is the most talented musician in our class.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">그녀는 우리 반에서 가장 재능 있는 음악가이다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">most<\/span><span class=\"chip\">talented<\/span><span class=\"chip\">musician<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"You should watch out for the wet floor.\" data-example=\"You should watch out for the wet floor.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">너는 젖은 바닥을 조심해야 한다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">should<\/span><span class=\"chip\">watch out<\/span><span class=\"chip\">floor<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 04 「No.0121~0160」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>She dreams of becoming a singer<\/b><\/span><div class=\"point\">전치사 of 뒤에는 동사에 -ing를 붙인 동명사(becoming)를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>He is both a composer and a player<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: either ✗)<\/span><div class=\"point\">&#x27;both A and B&#x27;는 &#x27;A와 B 둘 다&#x27;라는 짝꿍 표현이야. either는 쓰면 안 돼!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>Mount Everest is one of the natural wonders<\/b><\/span><div class=\"point\">&#x27;one of the + 복수명사(wonders)&#x27;는 &#x27;~중 하나&#x27;라는 뜻이라 뒤에 꼭 복수형을 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>He moved to the city to make a living<\/b><\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적은 &#x27;to + 동사원형(to make)&#x27;으로 나타내!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> allow → <span class=\"sol\"><b>allowed<\/b><\/span><div class=\"point\">&#x27;~하는 것이 허용되다&#x27;는 수동태 be동사 + p.p.라서 I&#x27;m 뒤에는 allowed가 맞아!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> breaked → <span class=\"sol\"><b>broke<\/b><\/span><div class=\"point\">break는 불규칙 동사라 과거형이 breaked가 아니라 broke야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> don&#x27;t → <span class=\"sol\"><b>doesn&#x27;t<\/b><\/span><div class=\"point\">주어 The teacher는 3인칭 단수라서 don&#x27;t가 아니라 doesn&#x27;t를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> to sit → <span class=\"sol\"><b>sitting<\/b><\/span><div class=\"point\">mind 뒤에는 to부정사가 아니라 동명사(-ing)를 써! mind sitting이 맞아.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> shake → <span class=\"sol\"><b>shook<\/b><\/span><div class=\"point\">shake는 불규칙 동사! 과거형은 shaked가 아니라 shook이야. (뒤 opened로 과거인 걸 알 수 있어)<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> bend → <span class=\"sol\"><b>were bending<\/b><\/span><div class=\"point\">과거에 진행 중이던 일은 &#x27;was/were + -ing&#x27;로 써. 주어가 복수(trees)니까 were bending!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> get → <span class=\"sol\"><b>to get<\/b><\/span><div class=\"point\">decide는 뒤에 &#x27;to + 동사원형&#x27;을 목적어로 써! decide to get이 맞아.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> beautiful → <span class=\"sol\"><b>more beautiful<\/b><\/span><div class=\"point\">beautiful처럼 긴 형용사의 비교급은 -er 대신 앞에 more를 붙여 more beautiful로 써!<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>I have already changed my mind.<\/b><\/span><div class=\"point\">과거의 일이 지금과 연결될 땐 현재완료 &#x27;have + p.p.(changed)&#x27;를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>This is a puzzle that I can&#x27;t solve.<\/b><\/span><div class=\"point\">사람이 아닌 것(puzzle)을 꾸며주는 목적격 관계대명사는 that이나 which를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>She is the most talented musician in our class.<\/b><\/span><div class=\"point\">talented처럼 긴 형용사의 최상급은 &#x27;the most + 형용사&#x27;로 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>You should watch out for the wet floor.<\/b><\/span><div class=\"point\">&#x27;~해야 한다&#x27;는 조동사 should를 쓰고, 조동사 뒤에는 항상 동사원형(watch)을 써!<\/div><\/div><\/div>", "day05": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"I prefer jazz to pop music\" data-trap=\"than\"><div><span class=\"num\">1.<\/span><span class=\"ko\">나는 대중음악보다 재즈를 선호한다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요 (함정 주의!)\"><\/div><div class=\"bank\"><span class=\"chip\">than<\/span><span class=\"chip\">jazz<\/span><span class=\"chip\">I<\/span><span class=\"chip\">music<\/span><span class=\"chip\">pop<\/span><span class=\"chip\">to<\/span><span class=\"chip\">prefer<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"The doctor advised me to exercise every day\"><div><span class=\"num\">2.<\/span><span class=\"ko\">의사는 내게 매일 운동할 것을 조언했다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">to<\/span><span class=\"chip\">day<\/span><span class=\"chip\">me<\/span><span class=\"chip\">exercise<\/span><span class=\"chip\">doctor<\/span><span class=\"chip\">advised<\/span><span class=\"chip\">every<\/span><span class=\"chip\">The<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"I&#x27;m looking forward to meeting you\"><div><span class=\"num\">3.<\/span><span class=\"ko\">당신을 만날 것을 기대하고 있습니다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">looking<\/span><span class=\"chip\">you<\/span><span class=\"chip\">to<\/span><span class=\"chip\">forward<\/span><span class=\"chip\">meeting<\/span><span class=\"chip\">I&#x27;m<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"Let&#x27;s find out when the movie starts\"><div><span class=\"num\">4.<\/span><span class=\"ko\">영화가 언제 시작하는지 알아보자.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">out<\/span><span class=\"chip\">find<\/span><span class=\"chip\">the<\/span><span class=\"chip\">Let&#x27;s<\/span><span class=\"chip\">starts<\/span><span class=\"chip\">movie<\/span><span class=\"chip\">when<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"butto \n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 05 「No.0161~0200」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>I prefer jazz to pop music<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: than ✗)<\/span><div class=\"point\">&#x27;prefer A to B&#x27;는 &#x27;B보다 A를 선호하다&#x27;라는 뜻! 비교급처럼 보여도 than이 아니라 to를 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>The doctor advised me to exercise every day<\/b><\/span><div class=\"point\">advise는 &#x27;advise + 목적어 + to부정사&#x27; 형태로 써! me 다음에 to exercise가 오는 거야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>I&#x27;m looking forward to meeting you<\/b><\/span><div class=\"point\">look forward to의 to는 전치사라서 뒤에 동명사(meeting)를 써야 해. meet이 아니야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>Let&#x27;s find out when the movie starts<\/b><\/span><div class=\"point\">문장 속에 들어간 의문문(간접의문문)은 &#x27;의문사 + 주어 + 동사&#x27; 어순이야. when the movie starts처럼 써.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> spreaded → <span class=\"sol\"><b>spread<\/b><\/span><div class=\"point\">spread는 불규칙 동사라서 과거형도 모양이 그대로 spread야. spreaded라는 말은 없어!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> repeats → <span class=\"sol\"><b>repeat<\/b><\/span><div class=\"point\">조동사 can 뒤에는 언제나 동사원형! repeats가 아니라 repeat이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> is → <span class=\"sol\"><b>are<\/b><\/span><div class=\"point\">주어가 복수(facts)라서 be동사도 복수형 are를 써야 해. There is → There are!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> hasn&#x27;t call → <span class=\"sol\"><b>hasn&#x27;t called<\/b><\/span><div class=\"point\">현재완료는 &#x27;have/has + 과거분사&#x27;! hasn&#x27;t 다음에는 call이 아니라 called를 써야 해.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> come → <span class=\"sol\"><b>to come<\/b><\/span><div class=\"point\">promise는 뒤에 to부정사가 와! 그래서 come을 to come으로 바꿔줘야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> think → <span class=\"sol\"><b>thought<\/b><\/span><div class=\"point\">think의 과거형은 불규칙이라 thinked가 아니라 thought야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> make → <span class=\"sol\"><b>making<\/b><\/span><div class=\"point\">전치사 on 뒤에 오는 동사는 동명사(~ing)로 바꿔! make → making.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> admire → <span class=\"sol\"><b>was admired<\/b><\/span><div class=\"point\">경관이 &#x27;감탄받는&#x27; 거니까 수동태 &#x27;be동사 + 과거분사&#x27;! 과거 상황이라 was admired로 써.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>I admire the teacher who works hard.<\/b><\/span><div class=\"point\">사람을 꾸며줄 땐 주격 관계대명사 who! &#x27;the teacher who works hard(열심히 일하는 선생님)&#x27;처럼 이어 붙여.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>Meeting someone in person is better than texting.<\/b><\/span><div class=\"point\">두 가지를 비교할 땐 &#x27;better than(~보다 더 좋은)&#x27;을 써! than 앞뒤로 비교 대상을 나란히 놔.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>I will tell my parents the truth.<\/b><\/span><div class=\"point\">미래의 일은 &#x27;will + 동사원형&#x27;! tell은 &#x27;tell + 사람 + 사물&#x27; 순서로 쓰면 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>This is the most exciting field trip.<\/b><\/span><div class=\"point\">긴 형용사의 최상급은 &#x27;the most + 형용사&#x27;! &#x27;the most exciting(가장 신나는)&#x27;처럼 써.<\/div><\/div><\/div>", "day06": "<div class=\"wb-ctrl\"><button type=\"button\" cla \/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"We can easily find information on the internet.|We can find information easily on the internet.\" data-example=\"We can easily find information on the internet.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">우리는 인터넷에서 쉽게 정보를 찾을 수 있다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">can<\/span><span class=\"chip\">find<\/span><span class=\"chip\">easily<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"She was sick, but she went to school anyway.|She was sick, but went to school anyway.\" data-example=\"She was sick, but she went to school anyway.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">그녀는 아팠지만 어쨌든 학교에 갔다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">sick<\/span><span class=\"chip\">but<\/span><span class=\"chip\">anyway<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"She has such a beautiful voice.\" data-example=\"She has such a beautiful voice.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">그녀는 너무나 아름다운 목소리를 가지고 있다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">such<\/span><span class=\"chip\">beautiful<\/span><span class=\"chip\">voice<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"The man who fixed the roof is my dad.|The man who fixed the roof is my father.\" data-example=\"The man who fixed the roof is my dad.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">지붕을 수리한 그 남자는 우리 아빠다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">who<\/span><span class=\"chip\">fixed<\/span><span class=\"chip\">roof<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 06 「No.0201~0240」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>She likes watching scary movies<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: watch ✗)<\/span><div class=\"point\">주어가 She(3인칭 단수)라서 동사에 -s를 붙여 likes! 그리고 like 뒤엔 동명사 watching을 썼어. 함정 단어 watch에 속지 마.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>He stayed at home instead of going out<\/b><\/span><div class=\"point\">전치사 instead of 뒤에는 명사 역할을 하는 동명사(going)를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>We spent a lot of money on shopping<\/b><\/span><div class=\"point\">spend의 과거형은 spended가 아니라 spent! 불규칙 동사라서 꼭 외워두자.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>The movie was even better than I thought<\/b><\/span><div class=\"point\">&#x27;훨씬 더 좋은&#x27;은 good의 비교급 better 앞에 even을 붙여 강조한 거야.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> fixing → <span class=\"sol\"><b>fixed<\/b><\/span><div class=\"point\">&#x27;~에 고정되어 있다&#x27;는 수동태라서 be동사(is) 뒤에 과거분사 fixed를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> leaved → <span class=\"sol\"><b>left<\/b><\/span><div class=\"point\">leave의 과거형은 leaved가 아니라 left! 불규칙 동사야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> please → <span class=\"sol\"><b>to please<\/b><\/span><div class=\"point\">&#x27;~하는 것&#x27;이라는 뜻으로 주어 역할을 하려면 to부정사 to please가 필요해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> feed → <span class=\"sol\"><b>feeds<\/b><\/span><div class=\"point\">주어 He는 3인칭 단수라서 현재형 동사에 -s를 붙여 feeds!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> tall → <span class=\"sol\"><b>taller<\/b><\/span><div class=\"point\">than(~보다)이 있으니 비교급! tall에 -er을 붙여 taller야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> forget → <span class=\"sol\"><b>forgot<\/b><\/span><div class=\"point\">forget의 과거형은 forgot. 불규칙 동사라 형태가 통째로 바뀌어!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> read → <span class=\"sol\"><b>reading<\/b><\/span><div class=\"point\">전치사 by 뒤에는 동명사(-ing)를 써야 해서 reading!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> close → <span class=\"sol\"><b>closed<\/b><\/span><div class=\"point\">&#x27;닫혔다/통제됐다&#x27;는 수동태(be + p.p.)라서 were 뒤에 closed를 써!<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>We can easily find information on the internet.<\/b><\/span><div class=\"point\">&#x27;~할 수 있다&#x27;는 조동사 can, 그 뒤에는 반드시 동사원형 find를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>She was sick, but she went to school anyway.<\/b><\/span><div class=\"point\">앞뒤 내용이 반대라 접속사 but으로 이어줬어. go의 과거형은 went!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>She has such a beautiful voice.<\/b><\/span><div class=\"point\">&#x27;너무나 ~한&#x27;은 such a + 형용사 + 명사 순서! such a beautiful voice.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>The man who fixed the roof is my dad.<\/b><\/span><div class=\"point\">사람을 꾸미면서 &#x27;~한&#x27;으로 이어줄 땐 주격 관계대명사 who를 써!<\/div><\/div><\/div>", "day07": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"He bought a pair of running shoes\" data-trap=\"buyed\"><div><span class=\"num\">1.<\/span><span class=\"ko\">그는 운동화 한 켤레를 샀다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요 (함정 주의!)\"><\/div><div class=\"bank\"><span class=\"chip\">buyed<\/span><span class=\"chip\">running<\/span><span class=\"chip\">pair<\/span><spa ata-answer=\"My backpack is lighter than yours.|My bag is lighter than yours.\" data-example=\"My backpack is lighter than yours.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">내 가방은 네 것보다 더 가벼워.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">backpack<\/span><span class=\"chip\">lighter<\/span><span class=\"chip\">than<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"I lost the pen that he lent me.|I lost the pen he lent me.|I lost the pen which he lent me.\" data-example=\"I lost the pen that he lent me.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">나는 그가 내게 빌려준 펜을 잃어버렸어.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">pen<\/span><span class=\"chip\">lent<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"The team deserved to win because they practiced hard.|They deserved to win because they practiced hard.\" data-example=\"The team deserved to win because they practiced hard.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">그 팀은 열심히 연습했기 때문에 이길 만했어.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">because<\/span><span class=\"chip\">practiced<\/span><span class=\"chip\">deserved<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">Day 09 「No.0321~0360」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>She won second place in the dance contest<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: winned ✗)<\/span><div class=\"point\">win의 과거형은 winned가 아니라 won이야! 불규칙 동사라 형태가 확 바뀌니까 조심해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>You should make decisions on your own<\/b><\/span><div class=\"point\">조동사 should 뒤에는 언제나 동사원형(make)을 써! &#x27;on your own&#x27;은 &#x27;스스로&#x27;라는 뜻이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>She studied hard to achieve her goals<\/b><\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적은 to+동사원형(to achieve)으로 나타내!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>Look both ways when you cross the street<\/b><\/span><div class=\"point\">&#x27;~할 때&#x27;는 접속사 when으로 연결해. when 뒤에는 &#x27;주어+동사(you cross)&#x27;가 와!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> award → <span class=\"sol\"><b>awarded<\/b><\/span><div class=\"point\">수동태는 &#x27;be동사 + 과거분사(p.p.)&#x27;! was 뒤에는 award가 아니라 awarded를 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> sticked → <span class=\"sol\"><b>stuck<\/b><\/span><div class=\"point\">stick은 불규칙 동사라 과거형이 sticked가 아니라 stuck이야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> focus → <span class=\"sol\"><b>focusing<\/b><\/span><div class=\"point\">&#x27;have difficulty ~ing(~하는 데 어려움을 겪다)&#x27;! 그래서 focus가 아니라 focusing으로 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> help → <span class=\"sol\"><b>helps<\/b><\/span><div class=\"point\">Education은 셀 수 없는 명사라 단수 취급! 동사에 -s를 붙여 helps로 써야 해.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> good → <span class=\"sol\"><b>best<\/b><\/span><div class=\"point\">&#x27;최고의&#x27;는 good의 최상급 best로! good-better-best, 불규칙 변화라 통째로 외워둬.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> make → <span class=\"sol\"><b>to make<\/b><\/span><div class=\"point\">&#x27;내리기 힘든 결정&#x27;처럼 명사 뒤에서 &#x27;~할&#x27;이라고 꾸밀 땐 to부정사(to make)를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> chat → <span class=\"sol\"><b>chatting<\/b><\/span><div class=\"point\">enjoy는 목적어로 동명사(-ing)를 좋아해! chat은 t를 하나 더 붙여 chatting이 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> empty → <span class=\"sol\"><b>emptied<\/b><\/span><div class=\"point\">&#x27;has + 과거분사&#x27;는 현재완료야. empty는 y를 i로 바꿔 emptied로 만들어!<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>There is a counselor who can help you.<\/b><\/span><div class=\"point\">&#x27;~해 줄 수 있는 (사람)&#x27;은 주격 관계대명사 who로 연결해! who 바로 뒤에 동사가 와.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>My backpack is lighter than yours.<\/b><\/span><div class=\"point\">둘을 비교할 땐 &#x27;비교급(-er) + than&#x27;! light는 lighter가 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>I lost the pen that he lent me.<\/b><\/span><div class=\"point\">&#x27;그가 빌려준 펜&#x27;처럼 목적어 자리를 꾸밀 땐 목적격 관계대명사 that/which를 쓰고, 생략도 가능해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>The team deserved to win because they practiced hard.<\/b><\/span><div class=\"point\">&#x27;~하기 때문에&#x27;라는 이유는 접속사 because로! because 뒤엔 &#x27;주어+동사&#x27;가 와.<\/div><\/div><\/div>", "day10": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"The whole family went on the trip\" data-trap=\"gone\"><div><span class=\"num\">1.<\/span><span class=\"ko\">가족 모두가 여행을 갔다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요 (함정 주의!)\"><\/div><div class=\"bank\"><span class=\"chip\">the<\/span><span class=\"chip\">went<\/span><span class=\"chip\">trip<\/span><span class=\"chip\">on<\/span><span class=\"chip\">whole<\/span><span class=\"chip\">family<\/span><span class=\"chip\">gone<\/span><span class=\"chip\">The<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"There are various ways to reduce stress\"><div><span class=\"num\">2.<\/span><span class=\"ko\">스트레스를 줄일 수 있는 여러 가지 방법들이 있다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">ways<\/span><span class=\"chip\">are<\/span><span class=\"chip\">to<\/span><span class=\"chip\">reduce<\/span><span class=\"chip\">The ote\">Day 12 「No.0441~0480」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>My family goes out for dinner weekly<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: go ✗)<\/span><div class=\"point\">family는 하나의 집단이라 단수 취급! 그래서 동사는 go가 아니라 goes를 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>The plane flew above the clouds<\/b><\/span><div class=\"point\">fly는 불규칙 동사라 과거형이 flied가 아니라 flew야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>There are many low buildings in this city<\/b><\/span><div class=\"point\">buildings처럼 복수 명사가 뒤에 오면 There is가 아니라 There are를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>I enjoy outdoor activities like hiking<\/b><\/span><div class=\"point\">&#x27;~같은&#x27;을 뜻하는 전치사 like 뒤에는 동사를 동명사(hiking)로 바꿔 써!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> sell → <span class=\"sol\"><b>sold<\/b><\/span><div class=\"point\">모델은 스스로 파는 게 아니라 &#x27;팔리는&#x27; 거니까 수동태! will be 다음엔 과거분사 sold를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> who → <span class=\"sol\"><b>which<\/b><\/span><div class=\"point\">선행사가 사람이 아니라 사물(film)이니까 관계대명사는 who 대신 which(또는 that)!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> catching → <span class=\"sol\"><b>to catch<\/b><\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적은 동명사가 아니라 to부정사(to catch)로 나타내!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> low → <span class=\"sol\"><b>lower<\/b><\/span><div class=\"point\">뒤에 than이 보이면 비교급 신호! low를 lower로 바꿔줘야 해.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> change → <span class=\"sol\"><b>changed<\/b><\/span><div class=\"point\">have 다음엔 과거분사! 현재완료(have+p
